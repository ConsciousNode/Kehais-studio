<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXXI. Contact Sheet — Kehai Interim</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #050608;
  font-family: ui-monospace, 'Cascadia Code', monospace;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

#title {
  font-size: 10px; letter-spacing: 3px; color: #1e2d3d;
  text-transform: uppercase; margin-bottom: 20px;
  transition: color 2s ease;
}
#title.visible { color: #4a6070; }

#grid {
  display: grid;
  grid-template-columns: repeat(6, 140px);
  gap: 3px;
}

.cell {
  position: relative;
  width: 140px; height: 88px;
  background: #060809;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.cell.visible { opacity: 1; }
.cell canvas { display: block; width: 100%; height: 100%; }

.cell-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 14px;
  background: rgba(5, 6, 8, 0.85);
  display: flex; align-items: center; padding: 0 5px;
  font-size: 8px; letter-spacing: 0.5px;
  color: #00e5ff;
  border-top: 1px solid rgba(0,229,255,0.08);
}

#note {
  margin-top: 20px;
  font-size: 9px; letter-spacing: 2px; color: #1e2d3d;
  text-align: center; line-height: 2;
  transition: color 2s ease;
}
#note.visible { color: #2a3f55; }
</style>
</head>
<body>

<div id="title">XXXI. CONTACT SHEET</div>

<div id="grid"></div>

<div id="note">
  A day sampled at even intervals.<br>
  Time laid flat so it can be read.
</div>

<script>
// ── 24 hours, sampled evenly — a day as a contact sheet ─────────

const COLS = 6;
const ROWS = 4;
const TOTAL = COLS * ROWS; // 24 cells — one per hour
const W = 140, H = 88;

// Hours 0–23, one per cell
const HOURS = Array.from({ length: TOTAL }, (_, i) => i);

// ── Sky quality per hour ─────────────────────────────────────────
// Returns { top: [r,g,b], bottom: [r,g,b], starDensity, haze, warmth }
function skyAt(h, seed) {
  const rng = mulberry32(seed ^ (h * 7919));

  const gradients = [
    // 0  1am — deep night
    { top: [2,4,12], bot: [4,8,20], stars: 0.9, haze: 0.0, warmth: 0.0 },
    { top: [2,4,12], bot: [4,8,20], stars: 0.9, haze: 0.0, warmth: 0.0 },
    { top: [2,4,12], bot: [4,8,20], stars: 0.85, haze: 0.0, warmth: 0.0 },
    { top: [2,4,12], bot: [4,8,20], stars: 0.8, haze: 0.0, warmth: 0.0 },
    // 4  pre-dawn
    { top: [4,6,20], bot: [18,12,35], stars: 0.5, haze: 0.1, warmth: 0.0 },
    // 5  dawn beginning
    { top: [12,8,30], bot: [80,40,60], stars: 0.2, haze: 0.2, warmth: 0.1 },
    // 6  dawn
    { top: [30,20,55], bot: [180,80,60], stars: 0.0, haze: 0.3, warmth: 0.3 },
    // 7  early morning
    { top: [60,100,160], bot: [220,160,100], stars: 0.0, haze: 0.2, warmth: 0.4 },
    // 8  morning
    { top: [80,140,200], bot: [230,200,160], stars: 0.0, haze: 0.1, warmth: 0.3 },
    // 9  mid morning
    { top: [90,150,210], bot: [220,215,200], stars: 0.0, haze: 0.05, warmth: 0.2 },
    // 10
    { top: [100,160,215], bot: [230,225,215], stars: 0.0, haze: 0.05, warmth: 0.15 },
    // 11
    { top: [110,165,220], bot: [235,230,220], stars: 0.0, haze: 0.0, warmth: 0.1 },
    // 12 noon — whitening
    { top: [120,170,220], bot: [240,238,235], stars: 0.0, haze: 0.0, warmth: 0.05 },
    // 13
    { top: [110,165,215], bot: [238,232,220], stars: 0.0, haze: 0.0, warmth: 0.1 },
    // 14
    { top: [100,155,210], bot: [235,225,200], stars: 0.0, haze: 0.05, warmth: 0.15 },
    // 15
    { top: [90,145,200], bot: [230,215,185], stars: 0.0, haze: 0.1, warmth: 0.2 },
    // 16  afternoon gold
    { top: [80,130,185], bot: [225,200,150], stars: 0.0, haze: 0.15, warmth: 0.3 },
    // 17  late afternoon
    { top: [60,100,160], bot: [215,165,100], stars: 0.0, haze: 0.2, warmth: 0.4 },
    // 18  golden hour
    { top: [40,70,130], bot: [200,120,60], stars: 0.0, haze: 0.3, warmth: 0.5 },
    // 19  dusk
    { top: [20,30,80], bot: [160,70,50], stars: 0.05, haze: 0.3, warmth: 0.4 },
    // 20  twilight
    { top: [8,15,45], bot: [80,35,50], stars: 0.3, haze: 0.1, warmth: 0.2 },
    // 21  evening
    { top: [4,8,25], bot: [18,12,35], stars: 0.6, haze: 0.05, warmth: 0.05 },
    // 22
    { top: [2,5,16], bot: [6,10,24], stars: 0.8, haze: 0.0, warmth: 0.0 },
    // 23  late night
    { top: [2,4,12], bot: [4,8,18], stars: 0.88, haze: 0.0, warmth: 0.0 },
  ];

  const g = gradients[h];
  return { top: g.top, bot: g.bot, stars: g.stars, haze: g.haze, warmth: g.warmth, rng };
}

// ── Render a cell canvas ─────────────────────────────────────────
function renderHour(canvas, hour, seed) {
  const ctx = canvas.getContext('2d');
  const sky = skyAt(hour, seed);
  const { rng } = sky;
  const w = canvas.width, h = canvas.height;

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  const [tr, tg, tb] = sky.top;
  const [br, bg, bb] = sky.bot;
  grad.addColorStop(0, `rgb(${tr},${tg},${tb})`);
  grad.addColorStop(1, `rgb(${br},${bg},${bb})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Stars
  if (sky.stars > 0) {
    const count = Math.floor(sky.stars * 60);
    for (let s = 0; s < count; s++) {
      const sx = rng() * w;
      const sy = rng() * h * 0.75;
      const brightness = 0.4 + rng() * 0.6;
      const radius = 0.3 + rng() * 0.7;
      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,230,255,${brightness * sky.stars})`;
      ctx.fill();
    }
  }

  // Horizon haze band
  if (sky.haze > 0) {
    const hazeGrad = ctx.createLinearGradient(0, h * 0.55, 0, h * 0.75);
    const [hr2, hg2, hb2] = sky.bot;
    hazeGrad.addColorStop(0, `rgba(${hr2},${hg2 + 20},${hb2 + 10},0)`);
    hazeGrad.addColorStop(0.5, `rgba(${hr2 + 30},${hg2 + 30},${hb2},${sky.haze * 0.5})`);
    hazeGrad.addColorStop(1, `rgba(${hr2},${hg2},${hb2},0)`);
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, h * 0.55, w, h * 0.2);
  }

  // Atmospheric noise (simple)
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (rng() - 0.5) * 8;
    d[i]   = Math.max(0, Math.min(255, d[i]   + n));
    d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
    d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
  }
  ctx.putImageData(imgData, 0, 0);

  // Warmth vignette (bottom corners)
  if (sky.warmth > 0) {
    const vg = ctx.createRadialGradient(w/2, h, h * 0.2, w/2, h, h);
    vg.addColorStop(0, `rgba(0,0,0,0)`);
    vg.addColorStop(1, `rgba(${Math.floor(80*sky.warmth)},${Math.floor(20*sky.warmth)},0,${sky.warmth * 0.3})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, w, h);
  }

  // Dark vignette edge
  const vig = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
  vig.addColorStop(0.5, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, w, h);
}

// ── Simple seeded RNG (mulberry32) ───────────────────────────────
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Hour label ───────────────────────────────────────────────────
function hourLabel(h) {
  const suffix = h < 12 ? 'AM' : 'PM';
  const display = h === 0 ? 12 : h > 12 ? h - 12 : h;
  const names = ['MIDNIGHT','','','','','PRE-DAWN','DAWN','MORNING','MORNING',
    'MID-MORN','','','NOON','','','','AFTERNOON','LATE-AFT',
    'GOLDEN','DUSK','TWILIGHT','EVENING','','LATE NIGHT'];
  const name = names[h] || `${display}${suffix}`;
  return `H${String(h).padStart(2,'0')} · ${name}`;
}

// ── Build grid ───────────────────────────────────────────────────
const SEED = Date.now();
const grid = document.getElementById('grid');
const cells = [];

for (let i = 0; i < TOTAL; i++) {
  const div = document.createElement('div');
  div.className = 'cell';

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H - 14;

  const label = document.createElement('div');
  label.className = 'cell-label';
  label.textContent = hourLabel(HOURS[i]);

  div.appendChild(canvas);
  div.appendChild(label);
  grid.appendChild(div);
  cells.push({ div, canvas, hour: HOURS[i] });
}

// ── Develop cells one by one, like a darkroom ────────────────────
async function develop(globalSeed) {
  // Pre-render all canvases
  for (const { canvas, hour } of cells) {
    renderHour(canvas, hour, globalSeed ^ hour);
  }

  // Title
  document.getElementById('title').classList.add('visible');
  await wait(800);

  // Reveal cells with stagger
  for (let i = 0; i < cells.length; i++) {
    cells[i].div.classList.add('visible');
    await wait(180 + Math.random() * 80);
  }

  await wait(500);
  document.getElementById('note').classList.add('visible');

  // Hold, then fade out and begin again
  await wait(14000);
  document.getElementById('title').classList.remove('visible');
  document.getElementById('note').classList.remove('visible');
  for (const { div } of cells) div.classList.remove('visible');
  await wait(2500);
  develop(Date.now()); // new seed, new day
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// Begin
develop(SEED);
</script>
</body>
</html>
