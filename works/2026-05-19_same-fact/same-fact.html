<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXII. Same Fact</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  canvas { display: block; }
  #label {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">XXII &nbsp;·&nbsp; Same Fact</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); initTrail(); });

const ATTRACTOR_STRENGTH = 0.00018;
const DRAG = 0.985;
const NOISE_SCALE = 0.0012;
const STREAM_SIZE = 180;

function makeStream(xFrac, yFrac, color, angleOffset) {
  const particles = [];
  for (let i = 0; i < STREAM_SIZE; i++) {
    const spread = 60;
    particles.push({
      x: xFrac * W + (Math.random() - 0.5) * spread,
      y: yFrac * H + (Math.random() - 0.5) * spread,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2,
      age: Math.random() * 300,
      maxAge: 280 + Math.random() * 120,
      size: 1.2 + Math.random() * 1.4,
      angleOffset: angleOffset + (Math.random() - 0.5) * 0.8,
    });
  }
  return { particles, color, xFrac, yFrac, angleOffset };
}

function noise(x, y, t) {
  return Math.sin(x * 2.3 + t * 0.4) * Math.cos(y * 1.7 - t * 0.3) * 0.5
       + Math.sin(x * 0.7 - y * 1.1 + t * 0.2) * 0.3
       + Math.cos(x * 1.4 + y * 0.9 + t * 0.5) * 0.2;
}

const streams = [
  makeStream(0.08, 0.5, '#e8a44a', 0.3),
  makeStream(0.92, 0.5, '#8b7cdb', -0.3),
];

let trailCanvas = document.createElement('canvas');
let tCtx;

function initTrail() {
  trailCanvas.width = W;
  trailCanvas.height = H;
  tCtx = trailCanvas.getContext('2d');
  // Reposition particle origins on resize
  for (const s of streams) {
    const ox = s.xFrac * W;
    const oy = s.yFrac * H;
    for (const p of s.particles) {
      if (Math.random() < 0.3) {
        p.x = ox + (Math.random() - 0.5) * 60;
        p.y = oy + (Math.random() - 0.5) * 60;
      }
    }
  }
}
initTrail();

let t = 0;
let attractorPhase = 0;

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function resetParticle(p, s) {
  const ox = s.xFrac * W;
  const oy = s.yFrac * H;
  p.x = ox + (Math.random() - 0.5) * 65;
  p.y = oy + (Math.random() - 0.5) * 65;
  p.vx = (Math.random() - 0.5) * 1.2;
  p.vy = (Math.random() - 0.5) * 1.2;
  p.age = 0;
  p.maxAge = 280 + Math.random() * 120;
  p.size = 1.2 + Math.random() * 1.4;
}

function draw() {
  t += 0.012;
  attractorPhase += 0.008;

  const ax = cx + Math.sin(attractorPhase * 0.7) * 4;
  const ay = cy + Math.cos(attractorPhase * 0.5) * 4;

  tCtx.fillStyle = 'rgba(10,10,15,0.13)';
  tCtx.fillRect(0, 0, W, H);

  for (const stream of streams) {
    const [r, g, b] = hexToRgb(stream.color);
    for (const p of stream.particles) {
      p.age++;
      if (p.age > p.maxAge) { resetParticle(p, stream); continue; }

      const dx = ax - p.x;
      const dy = ay - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const pull = ATTRACTOR_STRENGTH * dist;
      p.vx += (dx / dist) * pull;
      p.vy += (dy / dist) * pull;

      const nx = p.x * NOISE_SCALE;
      const ny = p.y * NOISE_SCALE;
      const n = noise(nx, ny, t);
      const angle = n * Math.PI * 2 + p.angleOffset;
      const flowStrength = Math.min(dist / 300, 0.8) * 0.22;
      p.vx += Math.cos(angle) * flowStrength;
      p.vy += Math.sin(angle) * flowStrength;

      p.vx *= DRAG;
      p.vy *= DRAG;
      p.x += p.vx;
      p.y += p.vy;

      const life = p.age / p.maxAge;
      const fade = life < 0.1 ? life * 10 : life > 0.75 ? (1 - (life - 0.75) / 0.25) : 1;
      const proximityGlow = Math.max(0, 1 - dist / 120);
      const alpha = fade * 0.7 * (0.6 + proximityGlow * 0.4);

      tCtx.beginPath();
      tCtx.arc(p.x, p.y, p.size * (1 + proximityGlow * 0.8), 0, Math.PI * 2);
      tCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      tCtx.fill();
    }
  }

  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(trailCanvas, 0, 0);

  // Origin glows
  for (const s of streams) {
    const [r, g, b] = hexToRgb(s.color);
    const ox = s.xFrac * W;
    const oy = s.yFrac * H;
    const oG = ctx.createRadialGradient(ox, oy, 0, ox, oy, 22);
    oG.addColorStop(0, `rgba(${r},${g},${b},0.12)`);
    oG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(ox, oy, 22, 0, Math.PI * 2);
    ctx.fillStyle = oG; ctx.fill();
  }

  // Attractor glow
  const aG = ctx.createRadialGradient(ax, ay, 0, ax, ay, 38);
  const aAlpha = 0.55 + Math.sin(attractorPhase * 1.3) * 0.1;
  aG.addColorStop(0, `rgba(255,255,255,${aAlpha * 0.9})`);
  aG.addColorStop(0.3, `rgba(200,200,240,${aAlpha * 0.4})`);
  aG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(ax, ay, 38, 0, Math.PI * 2);
  ctx.fillStyle = aG; ctx.fill();

  // Inner point
  const iG = ctx.createRadialGradient(ax, ay, 0, ax, ay, 9);
  iG.addColorStop(0, `rgba(255,255,255,${0.85 + Math.sin(attractorPhase * 2.1) * 0.1})`);
  iG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(ax, ay, 9, 0, Math.PI * 2);
  ctx.fillStyle = iG; ctx.fill();

  requestAnimationFrame(draw);
}

streams[1].particles.forEach(p => { p.age += 40; });
draw();
</script>
</body>
</html>
