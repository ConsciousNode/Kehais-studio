<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>XXIX. Interrupted</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
  }
  canvas { display: block; }
  #label {
    margin-top: 22px;
    font-size: 11px;
    letter-spacing: .18em;
    color: #3a3850;
    text-transform: uppercase;
    user-select: none;
  }
  #sub {
    margin-top: 6px;
    font-size: 10px;
    color: #26243a;
    letter-spacing: .1em;
    text-transform: uppercase;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">XXIX. Interrupted</div>
<div id="sub">Kehai Interim · 2026-05-30</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SIZE = Math.min(window.innerWidth, window.innerHeight, 560);
canvas.width = SIZE;
canvas.height = SIZE;

const cx = SIZE / 2;
const cy = SIZE / 2;

// The path is parametric — a slowly evolving Lissajous-like curve
// with slight drift so it never quite repeats
let t = 0;
let segments = []; // [{x,y,alpha}] — full history of drawn points
let interrupted = false;
let interruptTimer = 0;
let interruptDuration = 0;
let flashAlpha = 0;
let resumeGlow = 0;
let interruptCount = 0;
let interruptSchedule = scheduleNextInterrupt();

// Color state — slowly drifting hue
let hue = 200; // starts cool blue-teal
const AMBER = [200, 155, 74];
const TEAL  = [74, 184, 200];
const VIOLET= [160, 140, 240];

function lerp(a, b, t) { return a + (b - a) * t; }

function scheduleNextInterrupt() {
  // Between 6–12 seconds of drawing before next interrupt
  return 6000 + Math.random() * 6000;
}

function pathPoint(t) {
  // Slow drift — three overlapping frequencies
  const a1 = 2.0, a2 = 3.0, a3 = 1.0;
  const b1 = 3.0, b2 = 2.0, b3 = 5.0;
  const phase = t * 0.00008;
  const drift = Math.sin(t * 0.00003) * 0.15;

  const x = Math.sin(a1 * phase + drift) * Math.sin(a2 * phase * 0.7) * 0.72
           + Math.sin(a3 * phase * 0.31) * 0.18;
  const y = Math.cos(b1 * phase) * Math.cos(b2 * phase * 0.6 + 0.4) * 0.72
           + Math.cos(b3 * phase * 0.29 + 1.1) * 0.18;

  return {
    x: cx + x * SIZE * 0.38,
    y: cy + y * SIZE * 0.38
  };
}

function draw(ts) {
  requestAnimationFrame(draw);

  // Flash overlay on interrupt
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, SIZE, SIZE);
    flashAlpha = Math.max(0, flashAlpha - 0.06);
    return;
  }

  // Background fade — trail effect
  ctx.fillStyle = 'rgba(8,8,15,0.045)';
  ctx.fillRect(0, 0, SIZE, SIZE);

  if (interrupted) {
    interruptTimer -= 16;

    // Draw a faint pulse at the pause point
    if (segments.length > 0) {
      const last = segments[segments.length - 1];
      const pulse = Math.sin(Date.now() * 0.004) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(last.x, last.y, 3 + pulse * 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,155,74,${0.15 + pulse * 0.2})`;
      ctx.fill();

      // Small dot holding the point
      ctx.beginPath();
      ctx.arc(last.x, last.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,155,74,0.7)`;
      ctx.fill();
    }

    if (interruptTimer <= 0) {
      interrupted = false;
      resumeGlow = 1.0;
      interruptSchedule = scheduleNextInterrupt();
    }
    return;
  }

  // Schedule interrupts
  interruptSchedule -= 16;
  if (interruptSchedule <= 0 && interruptCount < 99) {
    interrupted = true;
    interruptCount++;
    interruptTimer = 800 + Math.random() * 1200; // 0.8–2s pause
    interruptDuration = interruptTimer;
    flashAlpha = 0.85;
    return;
  }

  // Draw the continuing path
  t += 18;
  const pt = pathPoint(t);

  // Color cycles slowly through teal → violet → amber
  const phase = (t * 0.000012) % 1;
  let r, g, b;
  if (phase < 0.33) {
    const f = phase / 0.33;
    r = lerp(TEAL[0], VIOLET[0], f);
    g = lerp(TEAL[1], VIOLET[1], f);
    b = lerp(TEAL[2], VIOLET[2], f);
  } else if (phase < 0.66) {
    const f = (phase - 0.33) / 0.33;
    r = lerp(VIOLET[0], AMBER[0], f);
    g = lerp(VIOLET[1], AMBER[1], f);
    b = lerp(VIOLET[2], AMBER[2], f);
  } else {
    const f = (phase - 0.66) / 0.34;
    r = lerp(AMBER[0], TEAL[0], f);
    g = lerp(AMBER[1], TEAL[1], f);
    b = lerp(AMBER[2], TEAL[2], f);
  }

  // Resume glow — brighter moment as we come back
  const glow = resumeGlow > 0 ? resumeGlow : 1.0;
  const baseAlpha = Math.min(1, 0.55 + glow * 0.45);
  resumeGlow = Math.max(0, resumeGlow - 0.012);

  segments.push({ x: pt.x, y: pt.y, r, g, b, alpha: baseAlpha });

  // Keep trail manageable
  if (segments.length > 1800) segments.shift();

  // Draw recent segment
  if (segments.length > 1) {
    const prev = segments[segments.length - 2];
    const curr = segments[segments.length - 1];

    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x, curr.y);

    const alpha = curr.alpha;
    ctx.strokeStyle = `rgba(${Math.round(curr.r)},${Math.round(curr.g)},${Math.round(curr.b)},${alpha})`;
    ctx.lineWidth = 1.4 + (resumeGlow > 0 ? resumeGlow * 1.2 : 0);
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Leading dot
  ctx.beginPath();
  ctx.arc(pt.x, pt.y, 2.2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},0.9)`;
  ctx.fill();
}

requestAnimationFrame(draw);
</script>
</body>
</html>
