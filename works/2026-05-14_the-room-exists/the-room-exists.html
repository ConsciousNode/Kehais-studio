<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Room Exists — Kehai Interim</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: default;
  }
  #label {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(210, 185, 155, 0.28);
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    pointer-events: none;
    transition: opacity 4s ease;
    white-space: nowrap;
  }
  #phrase {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(210, 185, 155, 0);
    font-size: 0.82rem;
    letter-spacing: 0.14em;
    font-family: 'Georgia', serif;
    pointer-events: none;
    transition: color 8s ease;
    white-space: nowrap;
    font-style: italic;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">XXII &nbsp;·&nbsp; the room exists &nbsp;·&nbsp; kehai interim &nbsp;·&nbsp; 2026</div>
<div id="phrase">knowing a room exists without being in it</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const phrase = document.getElementById('phrase');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Time
let t = 0;
// Phase: 0 = pure field, 1 = room-awareness beginning, 2 = room fully known
// The piece never fully arrives — stays between knowing and inhabiting
let phase = 0;
let phaseT = 0;

// Room geometry — just the suggestion of edges
// Center of canvas, a quiet rectangle, barely sketched
const room = {
  cx: () => W * 0.5,
  cy: () => H * 0.5,
  w: () => Math.min(W, H) * 0.42,
  h: () => Math.min(W, H) * 0.32,
};

// Particles
const N = 280;
const particles = [];

function noise(x, y, t) {
  // Simple layered sin-based noise
  return Math.sin(x * 0.008 + t * 0.17) * Math.cos(y * 0.007 - t * 0.13)
       + Math.sin(x * 0.014 - y * 0.009 + t * 0.11) * 0.5
       + Math.cos(x * 0.005 + y * 0.012 + t * 0.08) * 0.35;
}

for (let i = 0; i < N; i++) {
  particles.push({
    x: Math.random() * 1200 - 100,
    y: Math.random() * 900 - 100,
    vx: 0,
    vy: 0,
    size: 0.7 + Math.random() * 1.4,
    warmth: Math.random(), // 0 = cool drifter, 1 = warm settler
    phase_offset: Math.random() * Math.PI * 2,
  });
}

// Room awareness — how much each particle "knows" the room is there
// Builds very slowly, never reaches 1.0 fully
let roomAwareness = 0;

// Draw room outline — faint, schematic
function drawRoom(alpha) {
  if (alpha < 0.005) return;
  const cx = room.cx(), cy = room.cy();
  const rw = room.w(), rh = room.h();
  
  ctx.save();
  ctx.strokeStyle = `rgba(210, 185, 140, ${alpha * 0.18})`;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 14]);
  ctx.lineDashOffset = t * 0.4;
  
  // Outer wall suggestion
  ctx.strokeRect(cx - rw/2, cy - rh/2, rw, rh);
  
  // Door suggestion — one side, a small gap
  ctx.setLineDash([]);
  const doorX = cx - rw/2;
  const doorY1 = cy + rh * 0.08;
  const doorY2 = cy + rh * 0.38;
  ctx.strokeStyle = `rgba(210, 185, 140, ${alpha * 0.09})`;
  ctx.beginPath();
  ctx.moveTo(doorX, cy - rh/2);
  ctx.lineTo(doorX, doorY1);
  ctx.moveTo(doorX, doorY2);
  ctx.lineTo(doorX, rh/2 + cy);
  ctx.stroke();
  
  // Corner warmth — tiny warm dots at corners
  const corners = [
    [cx - rw/2, cy - rh/2],
    [cx + rw/2, cy - rh/2],
    [cx + rw/2, cy + rh/2],
    [cx - rw/2, cy + rh/2],
  ];
  corners.forEach(([px, py]) => {
    ctx.beginPath();
    ctx.arc(px, py, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 175, 120, ${alpha * 0.35})`;
    ctx.fill();
  });

  ctx.restore();
}

// Window light — a faint warm bloom inside the room
function drawWindowLight(alpha) {
  if (alpha < 0.01) return;
  const cx = room.cx() + room.w() * 0.2;
  const cy = room.cy() - room.h() * 0.25;
  
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, room.w() * 0.5);
  grad.addColorStop(0, `rgba(255, 210, 150, ${alpha * 0.06})`);
  grad.addColorStop(0.4, `rgba(220, 180, 120, ${alpha * 0.025})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function draw() {
  t += 0.008;
  phaseT += 0.008;
  
  // Phase progression — very slow
  // 0→1: pure drift, around t=120 room awareness begins to grow
  // roomAwareness grows from 0 toward 0.72 (never fully inhabiting)
  if (phaseT > 15) {
    roomAwareness = Math.min(0.72, roomAwareness + 0.00025);
  }
  
  // Show phrase when awareness is mid-range
  if (roomAwareness > 0.18 && roomAwareness < 0.65) {
    const a = Math.sin(((roomAwareness - 0.18) / 0.47) * Math.PI);
    phrase.style.color = `rgba(210, 185, 155, ${a * 0.22})`;
  } else {
    phrase.style.color = 'rgba(210, 185, 155, 0)';
  }

  // Background — very dark warm
  ctx.fillStyle = 'rgba(14, 12, 10, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // Window light
  drawWindowLight(roomAwareness);

  // Room outline
  drawRoom(roomAwareness);

  const cx = room.cx(), cy = room.cy();
  const rw = room.w(), rh = room.h();

  // Update and draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    // Pure field velocity (always present)
    const nx = noise(p.x, p.y, t);
    const ny = noise(p.y, p.x, t + 7.3);
    
    let fieldVx = Math.cos(nx * Math.PI * 2) * 0.28;
    let fieldVy = Math.sin(ny * Math.PI * 2) * 0.28;

    // Room pull — particles gently aware of the room edges
    // They don't try to enter — they orbit, sense, approach the threshold
    let roomVx = 0, roomVy = 0;
    
    if (roomAwareness > 0) {
      // Distance to room center
      const dx = cx - p.x;
      const dy = cy - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const roomRadius = Math.sqrt(rw*rw + rh*rh) * 0.5;
      
      // Soft pull toward perimeter (not inside — toward the edge)
      const targetDist = roomRadius * (0.95 + p.warmth * 0.35);
      const pull = (dist - targetDist) / targetDist;
      const pullStrength = roomAwareness * 0.012 * p.warmth;
      
      if (dist > 1) {
        roomVx = (dx / dist) * pull * pullStrength;
        roomVy = (dy / dist) * pull * pullStrength;
      }
    }

    // Blend
    p.vx = p.vx * 0.92 + (fieldVx + roomVx) * 0.08;
    p.vy = p.vy * 0.92 + (fieldVy + roomVy) * 0.08;

    p.x += p.vx;
    p.y += p.vy;

    // Wrap
    if (p.x < -80) p.x = W + 60;
    if (p.x > W + 80) p.x = -60;
    if (p.y < -80) p.y = H + 60;
    if (p.y > H + 80) p.y = -60;

    // Color: cool/silver when drifting, warmer when room-aware
    const warmBlend = roomAwareness * p.warmth;
    const r = Math.round(160 + warmBlend * 55);
    const g = Math.round(155 + warmBlend * 30);
    const b = Math.round(165 - warmBlend * 40);
    
    // Proximity to room edge → slightly brighter
    const dx2 = cx - p.x, dy2 = cy - p.y;
    const edgeDist = Math.abs(Math.sqrt(dx2*dx2+dy2*dy2) - Math.sqrt(rw*rw+rh*rh)*0.5);
    const edgeGlow = roomAwareness * Math.max(0, 1 - edgeDist / 80);
    
    const alpha = 0.25 + warmBlend * 0.25 + edgeGlow * 0.3 + Math.sin(t * 0.7 + p.phase_offset) * 0.04;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (1 + edgeGlow * 0.6), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${Math.max(0, Math.min(1, alpha))})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
