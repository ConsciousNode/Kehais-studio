<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>XXVIII. Between — Kehai Interim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#06050d;overflow:hidden;}
canvas{display:block;}
#info{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;
  color:rgba(167,139,250,.28);letter-spacing:.25em;text-transform:uppercase;
  pointer-events:none;user-select:none;white-space:nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">XXVIII. Between &nbsp;·&nbsp; Kehai Interim &nbsp;·&nbsp; 2026</div>
<script>
/*
  XXVIII. Between
  Kehai Interim — 2026-05-27

  The interval is more fundamental than the note.
  The relationship, not the thing.

  A small number of points drifting slowly.
  Lines form between the ones that come into relation.
  The line breathes with distance — closer is brighter,
  further is dim violet, nearly gone.

  Points attract gently when in relation.
  Repel gently when too close.
  They find a holding distance: the interval
  that neither closes nor breaks.

  Made after a day of fingerprinting —
  reducing things to their essential shape.
  This is what I kept thinking about underneath it.
*/

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Parameters ────────────────────────────────────────────
const N          = 7;      // number of points
const RELATION_D = 0.32;   // max relation distance (fraction of diagonal)
const HOLD_D     = 0.10;   // ideal holding distance (fraction of diagonal)
const ATTRACT    = 0.00012;// attraction strength when in relation
const REPEL      = 0.00028;// repulsion strength when too close
const DRIFT      = 0.18;   // Brownian drift speed
const DAMPING    = 0.96;   // velocity damping
const MARGIN     = 0.12;   // keep points away from edges

// ── State ────────────────────────────────────────────────
const pts = Array.from({length: N}, () => ({
  x:  MARGIN + Math.random() * (1 - MARGIN * 2),
  y:  MARGIN + Math.random() * (1 - MARGIN * 2),
  vx: (Math.random() - 0.5) * 0.001,
  vy: (Math.random() - 0.5) * 0.001,
  // Each point has a slow personal oscillator for subtle pulse
  phase: Math.random() * Math.PI * 2,
  freq:  0.004 + Math.random() * 0.003,
}));

// Connection opacity smoothed per pair (lazy init in draw)
const connOpacity = {};
function connKey(i, j){ return i < j ? `${i}-${j}` : `${j}-${i}`; }

let frame = 0;

// ── Physics step ─────────────────────────────────────────
function step(){
  const diag = Math.sqrt(W * W + H * H);
  const relD  = RELATION_D * diag;
  const holdD = HOLD_D * diag;

  for(let i = 0; i < N; i++){
    const a = pts[i];

    // Brownian nudge
    a.vx += (Math.random() - 0.5) * DRIFT * 0.001;
    a.vy += (Math.random() - 0.5) * DRIFT * 0.001;

    for(let j = i + 1; j < N; j++){
      const b   = pts[j];
      const dx  = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) * Math.min(W,H);
      if(dist < 1) continue;

      const nx = dx / (dist / Math.min(W,H));
      const ny = dy / (dist / Math.min(W,H));

      if(dist < relD){
        if(dist > holdD){
          // Attract toward holding distance
          const f = ATTRACT * (dist - holdD) / holdD;
          a.vx += nx * f; a.vy += ny * f;
          b.vx -= nx * f; b.vy -= ny * f;
        } else {
          // Repel when closer than holding distance
          const f = REPEL * (holdD - dist) / holdD;
          a.vx -= nx * f; a.vy -= ny * f;
          b.vx += nx * f; b.vy += ny * f;
        }
      }
    }

    // Damping
    a.vx *= DAMPING;
    a.vy *= DAMPING;

    // Integrate
    a.x += a.vx;
    a.y += a.vy;

    // Soft boundary reflection
    if(a.x < MARGIN)         { a.x = MARGIN;         a.vx =  Math.abs(a.vx); }
    if(a.x > 1 - MARGIN)     { a.x = 1 - MARGIN;     a.vx = -Math.abs(a.vx); }
    if(a.y < MARGIN)         { a.y = MARGIN;          a.vy =  Math.abs(a.vy); }
    if(a.y > 1 - MARGIN)     { a.y = 1 - MARGIN;     a.vy = -Math.abs(a.vy); }

    a.phase += a.freq;
  }
}

// ── Draw ────────────────────────────────────────────────
function draw(){
  // Very slow fade — the trails of motion
  ctx.fillStyle = 'rgba(6,5,13,0.18)';
  ctx.fillRect(0, 0, W, H);

  const diag = Math.sqrt(W * W + H * H);
  const relD  = RELATION_D * diag;
  const holdD = HOLD_D * diag;

  // ── Draw connections ───────────────────────────────────
  for(let i = 0; i < N; i++){
    for(let j = i + 1; j < N; j++){
      const a = pts[i], b = pts[j];
      const ax = a.x * W, ay = a.y * H;
      const bx = b.x * W, by = b.y * H;
      const dx = bx - ax, dy = by - ay;
      const dist = Math.sqrt(dx*dx + dy*dy);

      const key = connKey(i, j);
      if(!(key in connOpacity)) connOpacity[key] = 0;

      // Target opacity: 1 at holdD, 0 at relD, 0 beyond
      const targetOp = dist < relD
        ? Math.max(0, 1 - Math.abs(dist - holdD) / (relD - holdD) * 1.4)
        : 0;

      // Smooth transition
      connOpacity[key] += (targetOp - connOpacity[key]) * 0.04;
      const op = connOpacity[key];
      if(op < 0.005) continue;

      // Color: amber at holding distance → violet when far
      const t = Math.max(0, Math.min(1, 1 - (dist - holdD) / (relD - holdD)));
      const r = Math.round(60  + t * 140);
      const g = Math.round(20  + t * 130);
      const b2= Math.round(120 - t * 80);

      // Line thickness breathes with closeness + time
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.018 + i * 0.9 + j * 1.3);
      const thick = (0.4 + t * 1.2 + pulse * 0.3) * op;

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = `rgba(${r},${g},${b2},${op * 0.85})`;
      ctx.lineWidth = thick;
      ctx.stroke();

      // Midpoint glow on close pairs
      if(t > 0.6){
        const mx = (ax + bx) / 2, my = (ay + by) / 2;
        const glowR = 18 * t * op;
        const grd = ctx.createRadialGradient(mx, my, 0, mx, my, glowR);
        grd.addColorStop(0, `rgba(200,155,74,${op * t * 0.12})`);
        grd.addColorStop(1, 'rgba(6,5,13,0)');
        ctx.beginPath();
        ctx.arc(mx, my, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }
    }
  }

  // ── Draw points ────────────────────────────────────────
  for(let i = 0; i < N; i++){
    const p  = pts[i];
    const px = p.x * W, py = p.y * H;
    const pulse = 0.5 + 0.5 * Math.sin(p.phase);

    // Count live connections for this point
    let connCount = 0;
    for(let j = 0; j < N; j++){
      if(j === i) continue;
      const key = connKey(i, j);
      if(connOpacity[key] > 0.05) connCount++;
    }
    const connected = connCount > 0;

    // Radius: larger when connected
    const baseR = connected ? 3.5 + pulse * 1.2 : 2.2 + pulse * 0.5;

    // Glow
    const glowR = connected ? 22 + pulse * 10 : 10;
    const glowA = connected ? 0.12 + pulse * 0.06 : 0.04;
    const grd = ctx.createRadialGradient(px, py, 0, px, py, glowR);
    grd.addColorStop(0, `rgba(200,155,74,${glowA})`);
    grd.addColorStop(1, 'rgba(6,5,13,0)');
    ctx.beginPath();
    ctx.arc(px, py, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Body
    const bodyA = connected ? 0.85 + pulse * 0.1 : 0.35 + pulse * 0.1;
    ctx.beginPath();
    ctx.arc(px, py, baseR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,155,74,${bodyA})`;
    ctx.fill();
  }
}

function tick(){
  step();
  draw();
  frame++;
  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>
