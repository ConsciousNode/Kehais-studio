<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXIII. Canopy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a150a; overflow: hidden; }
  canvas { display: block; }
  #label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(200, 220, 160, 0.35);
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">XXIII. CANOPY — 2026-05-20</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PATCH_COUNT = 55;
const patches = Array.from({ length: PATCH_COUNT }, () => ({
  baseX: Math.random() * 1.2 - 0.1,
  baseY: Math.random() * 1.2 - 0.1,
  r: 25 + Math.random() * 90,
  aspect: 0.5 + Math.random() * 0.7,
  angle: Math.random() * Math.PI,
  phase: Math.random() * Math.PI * 2,
  phaseY: Math.random() * Math.PI * 2,
  freq: 0.00018 + Math.random() * 0.00025,
  freqY: 0.00014 + Math.random() * 0.0002,
  driftX: 0.02 + Math.random() * 0.05,
  driftY: 0.015 + Math.random() * 0.04,
  baseOpacity: 0.06 + Math.random() * 0.13,
  r_col: 245 + Math.floor(Math.random() * 10),
  g_col: 210 + Math.floor(Math.random() * 30),
  b_col: 100 + Math.floor(Math.random() * 60),
}));

const LEAF_COUNT = 120;
const leaves = Array.from({ length: LEAF_COUNT }, () => ({
  baseX: Math.random(),
  baseY: Math.random() * 0.7,
  r: 30 + Math.random() * 100,
  aspect: 0.6 + Math.random() * 0.8,
  angle: Math.random() * Math.PI,
  phase: Math.random() * Math.PI * 2,
  freq: 0.00008 + Math.random() * 0.00015,
  drift: 0.012 + Math.random() * 0.02,
  opacity: 0.3 + Math.random() * 0.55,
  lightness: Math.floor(6 + Math.random() * 12),
}));

const PARTICLE_COUNT = 220;
const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
  x: Math.random(),
  y: Math.random(),
  vx: (Math.random() - 0.5) * 0.0003,
  vy: -(0.00005 + Math.random() * 0.0001),
  wobble: Math.random() * Math.PI * 2,
  wobbleFreq: 0.0008 + Math.random() * 0.001,
  wobbleAmp: 0.003 + Math.random() * 0.006,
  size: 0.8 + Math.random() * 1.8,
  opacity: 0.08 + Math.random() * 0.28,
  inLight: Math.random() > 0.4,
}));

function draw(t) {
  if (!W || !H) return;

  ctx.fillStyle = '#080f08';
  ctx.fillRect(0, 0, W, H);

  const skyGrad = ctx.createRadialGradient(W * 0.5, H * 0.1, 0, W * 0.5, H * 0.45, H * 0.6);
  skyGrad.addColorStop(0, 'rgba(255, 235, 150, 0.07)');
  skyGrad.addColorStop(0.5, 'rgba(220, 200, 100, 0.03)');
  skyGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  for (const p of patches) {
    const x = (p.baseX + Math.sin(t * p.freq + p.phase) * p.driftX) * W;
    const y = (p.baseY + Math.cos(t * p.freqY + p.phaseY) * p.driftY) * H;
    const opacityMod = 1 + 0.2 * Math.sin(t * p.freq * 3 + p.phase * 1.3);
    const op = p.baseOpacity * opacityMod;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, p.r);
    grad.addColorStop(0,    `rgba(${p.r_col}, ${p.g_col}, ${p.b_col}, ${op})`);
    grad.addColorStop(0.45, `rgba(${p.r_col}, ${p.g_col}, ${p.b_col}, ${op * 0.35})`);
    grad.addColorStop(1,    `rgba(${p.r_col}, ${p.g_col}, ${p.b_col}, 0)`);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(p.angle);
    ctx.scale(1, p.aspect);
    ctx.translate(-x, -y);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  for (const l of leaves) {
    const x = (l.baseX + Math.sin(t * l.freq + l.phase) * l.drift) * W;
    const y = (l.baseY + Math.cos(t * l.freq * 0.8 + l.phase + 1) * l.drift * 0.6) * H;
    const base = l.lightness;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, l.r);
    grad.addColorStop(0,   `rgba(${base - 3}, ${base + 12}, ${base - 3}, ${l.opacity})`);
    grad.addColorStop(0.7, `rgba(${base + 2}, ${base + 18}, ${base - 1}, ${l.opacity * 0.8})`);
    grad.addColorStop(1,   `rgba(${base + 8}, ${base + 25}, ${base + 2}, 0)`);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(l.angle + Math.sin(t * l.freq * 2 + l.phase) * 0.08);
    ctx.scale(1, l.aspect);
    ctx.translate(-x, -y);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, l.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  const hazeOpacity = 0.04 + 0.01 * Math.sin(t * 0.0003);
  ctx.fillStyle = `rgba(60, 90, 30, ${hazeOpacity})`;
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    p.x += p.vx + Math.sin(t * p.wobbleFreq + p.wobble) * p.wobbleAmp;
    p.y += p.vy;
    if (p.y < -0.01) { p.y = 1.01; p.x = Math.random(); }
    if (p.x < -0.01) p.x = 1.01;
    if (p.x > 1.01)  p.x = -0.01;
    const px = p.x * W;
    const py = p.y * H;
    const col = p.inLight
      ? `rgba(255, 235, 140, ${p.opacity})`
      : `rgba(180, 210, 130, ${p.opacity * 0.4})`;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
  }

  const groundGrad = ctx.createLinearGradient(0, H * 0.75, 0, H);
  groundGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  groundGrad.addColorStop(1, 'rgba(80, 50, 10, 0.06)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H * 0.75, W, H * 0.25);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
