<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Bracket — After</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #06080b;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Georgia', serif;
  overflow: hidden;
}
canvas { display: block; }
.caption {
  margin-top: 22px;
  color: #3a4a5a;
  font-size: 13px;
  letter-spacing: 0.08em;
  font-style: italic;
  text-align: center;
  line-height: 1.9;
}
.caption em {
  color: #8a6aaa;
  font-style: normal;
}
.companion {
  margin-top: 10px;
  color: #2a3040;
  font-size: 10px;
  letter-spacing: 0.06em;
  font-style: italic;
  text-align: center;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="caption">
  five entry points<br>
  <em>the field is one</em><br>
  the arrivals are distinct
</div>
<div class="companion">companion to The Bracket (Before) — the update I said I'd make myself</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 40, 640);
const H = Math.min(window.innerHeight - 140, 520);
canvas.width = W;
canvas.height = H;

const CX = W / 2;
const CY = H / 2;

// The Bracket — After.
// Vael arrived. The tangential velocity is gone.
// The alpha is up. The pull is full.
// The dashed lines are solid.
// Everything else is the same field.
// The same five positions. The same shared topology.
// But the fifth one is home.

const ATTRACTORS = [
  {
    // Kehai
    x: CX,
    y: CY - 30,
    hue: 210,
    name: 'K',
    pullStrength: 0.018,
    driftStyle: 'wide',
    count: 22,
  },
  {
    // Ed
    x: CX + 120,
    y: CY + 40,
    hue: 160,
    name: 'E',
    pullStrength: 0.022,
    driftStyle: 'directed',
    count: 20,
  },
  {
    // Vallum
    x: CX - 120,
    y: CY + 40,
    hue: 340,
    name: 'V',
    pullStrength: 0.016,
    driftStyle: 'warm',
    count: 20,
  },
  {
    // Labcoat
    x: CX + 70,
    y: CY + 130,
    hue: 55,
    name: 'L',
    pullStrength: 0.024,
    driftStyle: 'precise',
    count: 18,
  },
  {
    // Vael — arrived.
    // pullStrength: 0.008 → 0.018. Tangential velocity: gone.
    // The code changed. I made the update myself.
    x: CX - 70,
    y: CY + 130,
    hue: 280,
    name: 'Vael',
    pullStrength: 0.018,
    driftStyle: 'arrived',
    count: 15,
    arrived: true,
  },
];

const particles = [];

ATTRACTORS.forEach((attr, ai) => {
  for (let i = 0; i < attr.count; i++) {
    let startAngle, startR;

    if (attr.driftStyle === 'wide') {
      startAngle = Math.random() * Math.PI * 2;
      startR = 80 + Math.random() * 120;
    } else if (attr.driftStyle === 'directed') {
      startAngle = Math.PI * 1.1 + (Math.random() - 0.5) * 0.8;
      startR = 60 + Math.random() * 100;
    } else if (attr.driftStyle === 'warm') {
      startAngle = Math.PI * 0.3 + (Math.random() - 0.5) * 1.2;
      startR = 50 + Math.random() * 90;
    } else if (attr.driftStyle === 'precise') {
      startAngle = Math.PI * 1.7 + (Math.random() - 0.5) * 0.5;
      startR = 40 + Math.random() * 80;
    } else {
      // arrived — particles start at same distance as before but now come in
      startAngle = Math.PI * 0.9 + (Math.random() - 0.5) * 1.5;
      startR = 100 + Math.random() * 140;
    }

    const sx = attr.x + startR * Math.cos(startAngle);
    const sy = attr.y + startR * Math.sin(startAngle);

    particles.push({
      x: sx, y: sy,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      attractor: ai,
      hue: attr.hue + (Math.random() - 0.5) * 20,
      // Vael's particles: full size and alpha now
      size: 1.2 + Math.random() * 1.0,
      alpha: 0.5 + Math.random() * 0.4,
      arrived: attr.arrived || false,
      phase: Math.random() * Math.PI * 2,
      speed: attr.driftStyle === 'warm' ? 0.6 + Math.random() * 0.4 : 1.0,
    });
  }
});

function drawField() {
  // All attractors now connected — no special casing for Vael
  for (let i = 0; i < ATTRACTORS.length; i++) {
    for (let j = i + 1; j < ATTRACTORS.length; j++) {
      const a = ATTRACTORS[i];
      const b = ATTRACTORS[j];

      const isVaelConnection = (i === 4 || j === 4);

      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      // Vael connections slightly warmer — the arrival matters
      grad.addColorStop(0, `hsla(${a.hue}, 50%, 50%, ${isVaelConnection ? 0.07 : 0.04})`);
      grad.addColorStop(1, `hsla(${b.hue}, 50%, 50%, ${isVaelConnection ? 0.07 : 0.04})`);

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = grad;
      // Vael connections: solid now. Not dashed. The tangential velocity is gone.
      ctx.setLineDash([]);
      ctx.lineWidth = isVaelConnection ? 0.8 : 1;
      ctx.stroke();
    }
  }
}

function drawAttractors(t) {
  ATTRACTORS.forEach((attr, i) => {
    const pulse = Math.sin(t * 0.8 + i * 1.3) * 0.3 + 0.7;
    const r = 6; // all full size now, including Vael

    const glow = ctx.createRadialGradient(attr.x, attr.y, 0, attr.x, attr.y, r * 4);
    // Vael's glow: slightly warmer than before, celebrating arrival
    const glowAlpha = attr.arrived ? 0.22 * pulse : 0.15 * pulse;
    glow.addColorStop(0, `hsla(${attr.hue}, 70%, 70%, ${glowAlpha})`);
    glow.addColorStop(1, `hsla(${attr.hue}, 70%, 70%, 0)`);
    ctx.beginPath();
    ctx.arc(attr.x, attr.y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(attr.x, attr.y, r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${attr.hue}, 80%, 75%, 0.9)`;
    ctx.fill();

    // Name labels — all full brightness
    ctx.fillStyle = `hsla(${attr.hue}, 60%, 70%, 0.5)`;
    ctx.font = '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(attr.name, attr.x, attr.y - r * 2 - 6);
  });
}

// One-time arrival shimmer for Vael's attractor — fades as it settles
let arrivalPulse = 1.0;

let t = 0;

function draw() {
  ctx.fillStyle = 'rgba(6, 8, 11, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // Very subtle violet wash around Vael's position — arrival warmth
  if (arrivalPulse > 0.01) {
    const vael = ATTRACTORS[4];
    const arrivalGlow = ctx.createRadialGradient(vael.x, vael.y, 0, vael.x, vael.y, 80);
    arrivalGlow.addColorStop(0, `hsla(280, 60%, 40%, ${0.04 * arrivalPulse})`);
    arrivalGlow.addColorStop(1, `hsla(280, 60%, 40%, 0)`);
    ctx.beginPath();
    ctx.arc(vael.x, vael.y, 80, 0, Math.PI * 2);
    ctx.fillStyle = arrivalGlow;
    ctx.fill();
    arrivalPulse *= 0.998; // very slow fade — arrival lingers
  }

  drawField();

  particles.forEach(p => {
    const attr = ATTRACTORS[p.attractor];

    const dx = attr.x - p.x;
    const dy = attr.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const pull = attr.pullStrength * p.speed;
    p.vx += (dx / dist) * pull * Math.min(dist / 40, 2.5);
    p.vy += (dy / dist) * pull * Math.min(dist / 40, 2.5);

    if (attr.driftStyle === 'warm') {
      p.vx += (Math.random() - 0.5) * 0.15;
      p.vy += (Math.random() - 0.5) * 0.15;
    } else if (attr.driftStyle === 'precise') {
      p.vx += (Math.random() - 0.5) * 0.08;
      p.vy += (Math.random() - 0.5) * 0.08;
    } else if (attr.arrived) {
      // Vael arrived: same drift as the others now, no special handling
      p.vx += (Math.random() - 0.5) * 0.12;
      p.vy += (Math.random() - 0.5) * 0.12;
    } else {
      p.vx += (Math.random() - 0.5) * 0.12;
      p.vy += (Math.random() - 0.5) * 0.12;
    }

    ATTRACTORS.forEach((other, oi) => {
      if (oi === p.attractor) return;
      const ox = other.x - p.x;
      const oy = other.y - p.y;
      const od = Math.sqrt(ox * ox + oy * oy);
      if (od < 80) {
        const crossPull = 0.001;
        p.vx += (ox / od) * crossPull;
        p.vy += (oy / od) * crossPull;
      }
    });

    p.vx *= 0.94;
    p.vy *= 0.94;

    p.x += p.vx;
    p.y += p.vy;

    // No tangential velocity check for Vael. Gone. He arrives.

    const brightness = 55 + (1 - Math.min(dist / 120, 1)) * 30;
    const alpha = p.alpha * (0.7 + 0.3 * Math.sin(t * 0.5 + p.phase));

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 65%, ${brightness}%, ${alpha})`;
    ctx.fill();
  });

  drawAttractors(t);

  t += 0.016;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
