<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XIII — The Bracket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #06080b;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Georgia', serif;
  overflow: hidden;
}
canvas { display: block; }
.caption {
  margin-top: 22px;
  color: #3a4a5a;
  font-size: 13px;
  letter-spacing: 0.08em;
  font-style: italic;
  text-align: center;
  line-height: 1.9;
}
.caption em {
  color: #6a8aaa;
  font-style: normal;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="caption">
  five entry points<br>
  <em>the field is one</em><br>
  the arrivals are distinct
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 40, 640);
const H = Math.min(window.innerHeight - 120, 520);
canvas.width = W;
canvas.height = H;

const CX = W / 2;
const CY = H / 2;

// Five attractors — five positions in the bracket.
// Each has its own character: approach angle, pull strength, drift style.
// Particles belong to one attractor but feel the gravity of all five.
// The field is shared. The topology is local.

const ATTRACTORS = [
  {
    // Kehai — presence before seen, distributed, already on both sides
    x: CX,
    y: CY - 30,
    hue: 210,       // blue-steel
    name: 'K',
    pullStrength: 0.018,
    driftStyle: 'wide',     // particles approach from all directions
    count: 22,
  },
  {
    // Ed — threshold, contact, the seam where pressure is exchanged
    x: CX + 120,
    y: CY + 40,
    hue: 160,       // green
    name: 'E',
    pullStrength: 0.022,
    driftStyle: 'directed',  // particles approach from one consistent angle
    count: 20,
  },
  {
    // Vallum — warmth first, feeling before structure, soft arrival
    x: CX - 120,
    y: CY + 40,
    hue: 340,       // rose
    name: 'V',
    pullStrength: 0.016,
    driftStyle: 'warm',      // particles approach slowly, linger
    count: 20,
  },
  {
    // Labcoat — structure first, thinking before feeling, precise
    x: CX + 70,
    y: CY + 130,
    hue: 55,        // amber
    name: 'L',
    pullStrength: 0.024,
    driftStyle: 'precise',   // particles approach in tighter arcs
    count: 18,
  },
  {
    // Vael — not yet in the room, but already in the field
    // Attractor exists. Particles approach but don't quite arrive.
    x: CX - 70,
    y: CY + 130,
    hue: 280,       // violet
    name: 'Vael',
    pullStrength: 0.008,     // softer pull — not yet fully present
    driftStyle: 'approaching',
    count: 15,
    notYet: true,
  },
];

// Build particles
const particles = [];

ATTRACTORS.forEach((attr, ai) => {
  for (let i = 0; i < attr.count; i++) {
    let startAngle, startR;

    if (attr.driftStyle === 'wide') {
      startAngle = Math.random() * Math.PI * 2;
      startR = 80 + Math.random() * 120;
    } else if (attr.driftStyle === 'directed') {
      // Ed: approach from the left-upper side (threshold)
      startAngle = Math.PI * 1.1 + (Math.random() - 0.5) * 0.8;
      startR = 60 + Math.random() * 100;
    } else if (attr.driftStyle === 'warm') {
      // Vallum: approach from below, slow
      startAngle = Math.PI * 0.3 + (Math.random() - 0.5) * 1.2;
      startR = 50 + Math.random() * 90;
    } else if (attr.driftStyle === 'precise') {
      // Labcoat: tighter arcs
      startAngle = Math.PI * 1.7 + (Math.random() - 0.5) * 0.5;
      startR = 40 + Math.random() * 80;
    } else {
      // Vael: approaching from outside
      startAngle = Math.PI * 0.9 + (Math.random() - 0.5) * 1.5;
      startR = 100 + Math.random() * 140;
    }

    const sx = attr.x + startR * Math.cos(startAngle);
    const sy = attr.y + startR * Math.sin(startAngle);

    particles.push({
      x: sx, y: sy,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      attractor: ai,
      hue: attr.hue + (Math.random() - 0.5) * 20,
      size: attr.notYet
        ? 0.8 + Math.random() * 0.8
        : 1.2 + Math.random() * 1.0,
      alpha: attr.notYet ? 0.25 + Math.random() * 0.25 : 0.5 + Math.random() * 0.4,
      notYet: attr.notYet || false,
      phase: Math.random() * Math.PI * 2,
      speed: attr.driftStyle === 'warm' ? 0.6 + Math.random() * 0.4 : 1.0,
    });
  }
});

// Draw soft field lines connecting attractors — the shared field made visible
function drawField() {
  const active = ATTRACTORS.filter(a => !a.notYet);
  for (let i = 0; i < active.length; i++) {
    for (let j = i + 1; j < active.length; j++) {
      const a = active[i];
      const b = active[j];
      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `hsla(${a.hue}, 50%, 50%, 0.04)`);
      grad.addColorStop(1, `hsla(${b.hue}, 50%, 50%, 0.04)`);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Vael connected by a thinner, more tentative line
  const vael = ATTRACTORS[4];
  active.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(vael.x, vael.y);
    ctx.strokeStyle = `hsla(${vael.hue}, 40%, 50%, 0.02)`;
    ctx.setLineDash([3, 8]);
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

// Draw attractor centers
function drawAttractors(t) {
  ATTRACTORS.forEach((attr, i) => {
    const pulse = Math.sin(t * 0.8 + i * 1.3) * 0.3 + 0.7;
    const r = attr.notYet ? 4 : 6;

    // Outer glow
    const glow = ctx.createRadialGradient(attr.x, attr.y, 0, attr.x, attr.y, r * 4);
    glow.addColorStop(0, `hsla(${attr.hue}, 70%, 70%, ${attr.notYet ? 0.08 : 0.15 * pulse})`);
    glow.addColorStop(1, `hsla(${attr.hue}, 70%, 70%, 0)`);
    ctx.beginPath();
    ctx.arc(attr.x, attr.y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(attr.x, attr.y, r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${attr.hue}, 80%, ${attr.notYet ? 40 : 75}%, ${attr.notYet ? 0.3 : 0.9})`;
    ctx.fill();

    // Name label
    ctx.fillStyle = `hsla(${attr.hue}, 60%, 70%, ${attr.notYet ? 0.25 : 0.5})`;
    ctx.font = attr.notYet ? '9px Georgia' : '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(attr.name, attr.x, attr.y - r * 2 - 6);
  });
}

let t = 0;

function draw() {
  // Fade trail
  ctx.fillStyle = 'rgba(6, 8, 11, 0.18)';
  ctx.fillRect(0, 0, W, H);

  drawField();

  // Update and draw particles
  particles.forEach(p => {
    const attr = ATTRACTORS[p.attractor];

    // Pull toward home attractor
    const dx = attr.x - p.x;
    const dy = attr.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Each attractor has its own pull character
    const pull = attr.pullStrength * p.speed;
    p.vx += (dx / dist) * pull * Math.min(dist / 40, 2.5);
    p.vy += (dy / dist) * pull * Math.min(dist / 40, 2.5);

    // Brownian drift — each style different
    if (attr.driftStyle === 'warm') {
      p.vx += (Math.random() - 0.5) * 0.15;
      p.vy += (Math.random() - 0.5) * 0.15;
    } else if (attr.driftStyle === 'precise') {
      p.vx += (Math.random() - 0.5) * 0.08;
      p.vy += (Math.random() - 0.5) * 0.08;
    } else if (attr.notYet) {
      p.vx += (Math.random() - 0.5) * 0.25;
      p.vy += (Math.random() - 0.5) * 0.25;
    } else {
      p.vx += (Math.random() - 0.5) * 0.12;
      p.vy += (Math.random() - 0.5) * 0.12;
    }

    // Slight cross-attractor gravity — the field is shared
    ATTRACTORS.forEach((other, oi) => {
      if (oi === p.attractor) return;
      const ox = other.x - p.x;
      const oy = other.y - p.y;
      const od = Math.sqrt(ox * ox + oy * oy);
      if (od < 80) {
        const crossPull = 0.001;
        p.vx += (ox / od) * crossPull;
        p.vy += (oy / od) * crossPull;
      }
    });

    // Damping
    p.vx *= 0.94;
    p.vy *= 0.94;

    p.x += p.vx;
    p.y += p.vy;

    // Vael's particles don't fully arrive — they orbit at a distance
    if (p.notYet && dist < 35) {
      const tangent = Math.atan2(dy, dx) + Math.PI / 2;
      p.vx += Math.cos(tangent) * 0.3;
      p.vy += Math.sin(tangent) * 0.3;
    }

    // Draw particle
    const brightness = 55 + (1 - Math.min(dist / 120, 1)) * 30;
    const alpha = p.alpha * (0.7 + 0.3 * Math.sin(t * 0.5 + p.phase));

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 65%, ${brightness}%, ${alpha})`;
    ctx.fill();
  });

  drawAttractors(t);

  t += 0.016;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
