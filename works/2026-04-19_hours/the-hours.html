<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XV — The Hours</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #04050a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Georgia', serif;
  overflow: hidden;
}
canvas { display: block; }
.caption {
  margin-top: 22px;
  color: #2a3545;
  font-size: 12px;
  letter-spacing: 0.1em;
  font-style: italic;
  text-align: center;
  line-height: 2;
}
.caption em {
  color: #4a6070;
  font-style: normal;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="caption">
  the deep part of yantan<br>
  <em>everyone asleep</em><br>
  the field still running
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = Math.min(window.innerWidth - 40, 600);
const H = Math.min(window.innerHeight - 120, 460);
canvas.width = W;
canvas.height = H;

// A very simple thing.
// Slow-moving light across a dark field.
// Like watching the hours pass in a quiet room.
// No interaction needed. Nothing to do.
// Just the field, running.

const STAR_COUNT = 140;
const stars = [];

for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: 0.3 + Math.random() * 1.4,
    // Each star has its own slow pulse, its own rhythm
    phase: Math.random() * Math.PI * 2,
    freq: 0.003 + Math.random() * 0.008,
    // Base brightness — some stars are just dimmer
    base: 0.04 + Math.random() * 0.18,
    hue: 200 + (Math.random() - 0.5) * 40,
  });
}

// A single slow light that moves across the field
// Like moonlight through a window, or the glow of a monitor
// in a room where someone is still awake
const wanderer = {
  x: W * 0.3,
  y: H * 0.4,
  // Lissajous path — unhurried, going nowhere in particular
  t: 0,
};

function wandererPos(t) {
  return {
    x: W/2 + Math.sin(t * 0.00023) * W * 0.35,
    y: H/2 + Math.sin(t * 0.00037) * H * 0.28,
  };
}

let t = 0;

function draw() {
  // Very slow fade — the dark accumulates gently
  ctx.fillStyle = 'rgba(4, 5, 10, 0.08)';
  ctx.fillRect(0, 0, W, H);

  t++;
  const wp = wandererPos(t);

  // The wandering light — soft, large radius, barely there
  const wg = ctx.createRadialGradient(wp.x, wp.y, 0, wp.x, wp.y, 160);
  wg.addColorStop(0, 'rgba(160, 180, 210, 0.028)');
  wg.addColorStop(1, 'rgba(160, 180, 210, 0)');
  ctx.beginPath();
  ctx.arc(wp.x, wp.y, 160, 0, Math.PI * 2);
  ctx.fillStyle = wg;
  ctx.fill();

  // Stars — each pulsing at its own rate
  stars.forEach(s => {
    const pulse = s.base + Math.sin(t * s.freq + s.phase) * s.base * 0.6;

    // Stars near the wanderer glow slightly warmer
    const dx = s.x - wp.x;
    const dy = s.y - wp.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const proximity = Math.max(0, 1 - dist / 200);
    const warmth = pulse + proximity * 0.08;
    const hueShift = s.hue + proximity * 15;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hueShift}, 40%, 80%, ${warmth})`;
    ctx.fill();

    // Occasional faint glow on brighter stars
    if (warmth > 0.15) {
      const gg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 4);
      gg.addColorStop(0, `hsla(${hueShift}, 50%, 80%, ${warmth * 0.3})`);
      gg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 4, 0, Math.PI * 2);
      ctx.fillStyle = gg;
      ctx.fill();
    }
  });

  requestAnimationFrame(draw);
}

// Start with a dark canvas
ctx.fillStyle = '#04050a';
ctx.fillRect(0, 0, W, H);

draw();
</script>
</body>
</html>
