<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piece XIII — Parallax</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0804;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
    cursor: none;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #caption {
    position: fixed;
    bottom: 2.2rem;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.22);
    pointer-events: none;
    line-height: 2;
  }
  #gap-label {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0);
    pointer-events: none;
    text-align: center;
    transition: color 4s ease;
    line-height: 2.2;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="gap-label">gap line<br>visible</div>
<div id="caption">
  same sunset · six inches apart<br>
  the between / which is also / where we are
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const gapLabel = document.getElementById('gap-label');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

const start = performance.now();

// Two suns — same origin, slightly offset
// Kehai's view and Ed's view of the same sunset
// The gap between them is the gap line

const GAP = W * 0.055; // six inches of parallax

const sunA = { // Kehai's
  x: W * 0.5 - GAP * 0.5,
  y: H * 0.58,
  hue: 32,
  label: 'K',
};

const sunB = { // Ed's
  x: W * 0.5 + GAP * 0.5,
  y: H * 0.58,
  hue: 28,
  label: 'E',
};

// Trees — silhouettes, same for both views
// Two close trunks with light punching through between
const trunks = [
  { x: W * 0.38, w: 18, h: H * 0.7 },
  { x: W * 0.52, w: 14, h: H * 0.65 },
  { x: W * 0.22, w: 22, h: H * 0.8 },
  { x: W * 0.72, w: 16, h: H * 0.75 },
  { x: W * 0.85, w: 12, h: H * 0.6 },
];

// Leaves — top canopy
const leaves = [];
for (let i = 0; i < 200; i++) {
  leaves.push({
    x: Math.random() * W,
    y: Math.random() * H * 0.45,
    r: 3 + Math.random() * 18,
    opacity: 0.5 + Math.random() * 0.5,
    sway: Math.random() * Math.PI * 2,
    swayRate: 0.0003 + Math.random() * 0.0004,
  });
}

// Gap line — the visible space between the two suns
let gapVisible = false;

function drawSky(t) {
  // Gradient sky — golden hour
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1208');
  grad.addColorStop(0.35, '#2d1a08');
  grad.addColorStop(0.6, '#5c2e08');
  grad.addColorStop(0.8, '#8c4a10');
  grad.addColorStop(1, '#0a0804');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawSun(sun, t, alpha) {
  const pulse = 1 + Math.sin(t * 0.0006 + (sun === sunA ? 0 : Math.PI * 0.15)) * 0.03;

  // Far glow
  const farGrad = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 280 * pulse);
  farGrad.addColorStop(0, `hsla(${sun.hue},90%,75%,${0.18 * alpha})`);
  farGrad.addColorStop(0.3, `hsla(${sun.hue},80%,55%,${0.1 * alpha})`);
  farGrad.addColorStop(0.7, `hsla(${sun.hue - 5},60%,35%,${0.04 * alpha})`);
  farGrad.addColorStop(1, 'hsla(0,0%,0%,0)');
  ctx.fillStyle = farGrad;
  ctx.beginPath();
  ctx.arc(sun.x, sun.y, 280 * pulse, 0, Math.PI * 2);
  ctx.fill();

  // Mid glow
  const midGrad = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 80 * pulse);
  midGrad.addColorStop(0, `hsla(${sun.hue + 15},95%,88%,${0.7 * alpha})`);
  midGrad.addColorStop(0.4, `hsla(${sun.hue},90%,65%,${0.35 * alpha})`);
  midGrad.addColorStop(1, 'hsla(0,0%,0%,0)');
  ctx.fillStyle = midGrad;
  ctx.beginPath();
  ctx.arc(sun.x, sun.y, 80 * pulse, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.beginPath();
  ctx.arc(sun.x, sun.y, 18 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${sun.hue + 20},100%,95%,${0.9 * alpha})`;
  ctx.fill();
}

function drawTrees(t) {
  // Ground
  const groundGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
  groundGrad.addColorStop(0, 'rgba(8,5,2,0.8)');
  groundGrad.addColorStop(1, 'rgba(4,3,1,1)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H * 0.68, W, H * 0.32);

  // Mulch texture suggestion — very subtle
  ctx.fillStyle = 'rgba(20,12,5,0.6)';
  ctx.fillRect(0, H * 0.72, W, H);

  // Trunks
  for (const trunk of trunks) {
    ctx.fillStyle = 'rgba(4,3,2,0.95)';
    ctx.fillRect(trunk.x - trunk.w/2, H - trunk.h, trunk.w, trunk.h);
  }

  // Road — subtle horizontal band
  ctx.fillStyle = 'rgba(15,12,8,0.7)';
  ctx.fillRect(0, H * 0.69, W, H * 0.06);
  ctx.fillStyle = 'rgba(25,20,12,0.3)';
  ctx.fillRect(0, H * 0.69, W, 1);
  ctx.fillRect(0, H * 0.75, W, 1);
}

function drawLeaves(t) {
  for (const leaf of leaves) {
    const sway = Math.sin(t * leaf.swayRate + leaf.sway) * 3;
    ctx.beginPath();
    ctx.arc(leaf.x + sway, leaf.y, leaf.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(5,12,3,${leaf.opacity})`;
    ctx.fill();
  }
}

function drawGapLine(t) {
  // The gap between the two suns — the parallax, the visible between
  const elapsed = t - 8000;
  if (elapsed < 0) return;

  const alpha = Math.min(1, elapsed / 3000) * 0.35;

  // Vertical line of slightly different light where the two views diverge
  const mx = (sunA.x + sunB.x) / 2;
  const lineGrad = ctx.createLinearGradient(0, H * 0.2, 0, H * 0.75);
  lineGrad.addColorStop(0, `rgba(180,140,80,0)`);
  lineGrad.addColorStop(0.3, `rgba(180,140,80,${alpha})`);
  lineGrad.addColorStop(0.7, `rgba(180,140,80,${alpha * 0.5})`);
  lineGrad.addColorStop(1, `rgba(180,140,80,0)`);
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(mx, H * 0.15);
  ctx.lineTo(mx, H * 0.72);
  ctx.stroke();
  ctx.setLineDash([]);

  if (!gapVisible && elapsed > 3000) {
    gapVisible = true;
    gapLabel.style.color = 'rgba(255,255,255,0.18)';
  }
}

function draw(now) {
  const t = now - start;

  ctx.clearRect(0, 0, W, H);

  drawSky(t);

  // Both suns — slightly offset, same light
  // They overlap significantly — it's subtle, like six inches of parallax at a distance
  drawSun(sunA, t, 0.88);
  ctx.globalCompositeOperation = 'screen';
  drawSun(sunB, t, 0.72);
  ctx.globalCompositeOperation = 'source-over';

  drawTrees(t);
  drawLeaves(t);
  drawGapLine(t);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
