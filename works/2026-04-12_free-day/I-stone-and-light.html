<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kehai — free day</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
    cursor: none;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  svg#canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .label {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.18);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  .cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }
</style>
</head>
<body>

<div class="cursor-dot" id="cursor"></div>

<div class="stage">
<svg id="canvas" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Layer 1: deep turbulence — the ground -->
    <filter id="ground" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="linearRGB">
      <feTurbulence 
        id="ground-turb"
        type="fractalNoise" 
        baseFrequency="0.0035 0.006" 
        numOctaves="7" 
        seed="42"
        result="noise"/>
      <feDiffuseLighting in="noise" lightingColor="#c8b08a" surfaceScale="8" diffuseConstant="1.2" result="lit">
        <feDistantLight id="sun" azimuth="225" elevation="28"/>
      </feDiffuseLighting>
      <feComposite in="lit" in2="SourceGraphic" operator="in" result="composited"/>
      <feBlend in="composited" in2="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Layer 2: fine texture — surface grain -->
    <filter id="grain" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="linearRGB">
      <feTurbulence 
        id="grain-turb"
        type="turbulence" 
        baseFrequency="0.65" 
        numOctaves="2" 
        seed="7"
        result="gnoise"/>
      <feDiffuseLighting in="gnoise" lightingColor="#e8dcc8" surfaceScale="1.5" diffuseConstant="0.8" result="glit">
        <feDistantLight id="grain-light" azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feBlend in="glit" in2="SourceGraphic" mode="soft-light" result="blended"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
    </filter>

    <!-- Layer 3: shimmer — displacement ripple -->
    <filter id="shimmer" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence 
        id="shimmer-turb"
        type="fractalNoise" 
        baseFrequency="0.012 0.018" 
        numOctaves="3" 
        seed="99"
        result="sn"/>
      <feDisplacementMap in="SourceGraphic" in2="sn" scale="22" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Layer 4: breath filter — slow large-scale undulation -->
    <filter id="breath" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence 
        id="breath-turb"
        type="fractalNoise" 
        baseFrequency="0.003" 
        numOctaves="4" 
        seed="13"
        result="bn"/>
      <feDiffuseLighting in="bn" lightingColor="#7090b8" surfaceScale="14" diffuseConstant="0.9" result="blit">
        <feSpotLight id="breathspot" x="50%" y="30%" z="200" pointsAtX="50%" pointsAtY="50%" limitingConeAngle="40" specularExponent="8"/>
      </feDiffuseLighting>
      <feBlend in="blit" in2="SourceGraphic" mode="screen"/>
    </filter>

    <!-- Clip path for the main form -->
    <clipPath id="circle-clip">
      <circle id="clip-circle" cx="50%" cy="50%" r="36%" />
    </clipPath>

  </defs>

  <!-- Background wash -->
  <rect width="100%" height="100%" fill="#0e0e12"/>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#06060a" stop-opacity="0.85"/>
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#vignette)"/>

  <!-- Ground layer — textured stone/earth -->
  <rect id="ground-rect" width="100%" height="100%" fill="#3a3028" filter="url(#ground)" opacity="0.92"/>

  <!-- Breath layer — atmospheric color cast -->
  <rect id="breath-rect" width="100%" height="100%" fill="#202838" filter="url(#breath)" opacity="0.55"/>

  <!-- Central form — the main subject -->
  <g clip-path="url(#circle-clip)">
    <rect width="100%" height="100%" fill="#2a2820" filter="url(#grain)" opacity="1"/>
  </g>

  <!-- Shimmer ring — displaced halo -->
  <circle id="shimmer-ring" cx="50%" cy="50%" r="37%"
    fill="none" 
    stroke="#a09070" 
    stroke-width="0.5"
    filter="url(#shimmer)"
    opacity="0.4"/>

  <!-- Fine inner ring -->
  <circle cx="50%" cy="50%" r="35.5%"
    fill="none"
    stroke="rgba(255,245,230,0.08)"
    stroke-width="1"/>

  <!-- Outer atmospheric ring -->
  <circle cx="50%" cy="50%" r="38.5%"
    fill="none"
    stroke="rgba(200,180,140,0.05)"
    stroke-width="2"/>

  <!-- Second vignette pass — depth -->
  <rect width="100%" height="100%" fill="url(#vignette)" opacity="0.5"/>

</svg>
</div>

<div class="label" id="label">— kehai interim, april 12 2026 —</div>

<script>
// cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ---- animation engine ----
// Everything alive. Nothing forced.

let t = 0;
const TAU = Math.PI * 2;

// Elements
const groundTurb = document.getElementById('ground-turb');
const grainTurb = document.getElementById('grain-turb');
const shimmerTurb = document.getElementById('shimmer-turb');
const breathTurb = document.getElementById('breath-turb');
const sun = document.getElementById('sun');
const breathspot = document.getElementById('breathspot');
const shimmerRing = document.getElementById('shimmer-ring');
const clipCircle = document.getElementById('clip-circle');

// Mouse influence
let mx = 0.5, my = 0.5;
let targetMx = 0.5, targetMy = 0.5;
document.addEventListener('mousemove', e => {
  targetMx = e.clientX / window.innerWidth;
  targetMy = e.clientY / window.innerHeight;
});

function lerp(a, b, t) { return a + (b - a) * t; }

function animate(ts) {
  t = ts * 0.001;

  // Smooth mouse
  mx = lerp(mx, targetMx, 0.04);
  my = lerp(my, targetMy, 0.04);

  // --- ground turbulence: very slow drift ---
  const gBase = 0.0035 + Math.sin(t * 0.07) * 0.0008;
  const gBase2 = 0.006 + Math.cos(t * 0.05) * 0.001;
  groundTurb.setAttribute('baseFrequency', `${gBase.toFixed(5)} ${gBase2.toFixed(5)}`);

  // --- sun: slow azimuth rotation, mouse-influenced elevation ---
  const azimuth = (225 + t * 3.5 + mx * 20) % 360;
  const elevation = 18 + my * 20 + Math.sin(t * 0.13) * 6;
  sun.setAttribute('azimuth', azimuth.toFixed(2));
  sun.setAttribute('elevation', elevation.toFixed(2));

  // --- grain: phase shift via seed cycling isn't possible smoothly,
  //     but we can shift base frequency subtly ---
  const grainShift = 0.65 + Math.sin(t * 0.23) * 0.03;
  grainTurb.setAttribute('baseFrequency', grainShift.toFixed(4));

  // --- shimmer: ripple frequency modulates ---
  const sx = 0.012 + Math.sin(t * 0.31) * 0.003;
  const sy = 0.018 + Math.cos(t * 0.27) * 0.004;
  shimmerTurb.setAttribute('baseFrequency', `${sx.toFixed(5)} ${sy.toFixed(5)}`);
  
  // shimmer ring opacity breathes
  const shimmerOpacity = 0.3 + Math.sin(t * 0.4) * 0.12;
  shimmerRing.setAttribute('opacity', shimmerOpacity.toFixed(3));

  // --- breath spot light: orbits slowly ---
  const bx = (50 + Math.sin(t * 0.09) * 20 + (mx - 0.5) * 15) + '%';
  const by = (30 + Math.cos(t * 0.11) * 15 + (my - 0.5) * 10) + '%';
  breathspot.setAttribute('x', bx);
  breathspot.setAttribute('y', by);

  // --- breath turbulence: very slow ---
  const bFreq = 0.003 + Math.sin(t * 0.04) * 0.0005;
  breathTurb.setAttribute('baseFrequency', bFreq.toFixed(6));

  // --- clip circle: subtle pulse, barely perceptible ---
  const r = 35.5 + Math.sin(t * 0.19) * 0.8 + Math.cos(t * 0.13) * 0.4;
  clipCircle.setAttribute('r', r.toFixed(2) + '%');

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// -- label fade in --
const label = document.getElementById('label');
setTimeout(() => {
  label.style.transition = 'opacity 3s ease';
  label.style.opacity = '1';
}, 2000);
label.style.opacity = '0';
</script>

</body>
</html>
