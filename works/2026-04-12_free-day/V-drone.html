<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kehai — free day v</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    color: rgba(255,255,255,0.7);
    overflow: hidden;
    cursor: default;
  }

  .field {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#viz {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.7;
  }

  .ui {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    width: 100%;
    max-width: 520px;
    padding: 2rem;
  }

  .title {
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }

  .start-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    padding: 0.8rem 2rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .start-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.04);
  }
  .start-btn.playing {
    border-color: rgba(180,140,255,0.4);
    color: rgba(180,140,255,0.8);
  }

  .sliders {
    display: none;
    flex-direction: column;
    gap: 1.4rem;
    width: 100%;
  }
  .sliders.visible { display: flex; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .slider-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    width: 90px;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(180,140,255,0.8);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.4);
  }

  .val {
    font-size: 0.5rem;
    color: rgba(255,255,255,0.2);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .status {
    font-size: 0.5rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.15);
    font-style: italic;
    text-align: center;
    min-height: 1.2em;
  }

  .note {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1);
    white-space: nowrap;
    font-style: italic;
  }
</style>
</head>
<body>

<canvas id="viz"></canvas>

<div class="field">
  <div class="ui">
    <div class="title">kehai — free day v — drone</div>

    <button class="start-btn" id="startBtn">[ begin ]</button>

    <div class="sliders" id="sliders">
      <div class="slider-row">
        <span class="slider-label">root</span>
        <input type="range" id="rootFreq" min="30" max="120" value="55" step="0.5">
        <span class="val" id="rootVal">55</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">drift</span>
        <input type="range" id="drift" min="0" max="100" value="30">
        <span class="val" id="driftVal">30</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">texture</span>
        <input type="range" id="texture" min="0" max="100" value="45">
        <span class="val" id="textureVal">45</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">upper</span>
        <input type="range" id="upper" min="0" max="100" value="35">
        <span class="val" id="upperVal">35</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">density</span>
        <input type="range" id="density" min="0" max="100" value="50">
        <span class="val" id="densityVal">50</span>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<div class="note">a drone that doesn't resolve — kehai interim, april 12 2026</div>

<script>
const canvas = document.getElementById('viz');
const ctx2 = canvas.getContext('2d');
let W, H;
function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---- audio engine ----
let ac = null;
let playing = false;
let nodes = {};

function getVal(id) {
  return parseFloat(document.getElementById(id).value);
}

function buildDrone() {
  ac = new AudioContext();

  const masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0.0001, ac.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.72, ac.currentTime + 3.5);
  masterGain.connect(ac.destination);

  // ---- root oscillator cluster ----
  // slightly detuned pair for natural beating
  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  osc1.type = 'sawtooth';
  osc2.type = 'sawtooth';

  const f = getVal('rootFreq');
  osc1.frequency.value = f;
  osc2.frequency.value = f * 1.0015; // slight detune

  // low-pass filter — warm
  const lpf = ac.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 380;
  lpf.Q.value = 0.7;

  const g1 = ac.createGain();
  const g2 = ac.createGain();
  g1.gain.value = 0.5;
  g2.gain.value = 0.45;

  osc1.connect(g1); g1.connect(lpf);
  osc2.connect(g2); g2.connect(lpf);
  lpf.connect(masterGain);

  osc1.start();
  osc2.start();

  // ---- fifth above ----
  const osc5 = ac.createOscillator();
  osc5.type = 'sine';
  osc5.frequency.value = f * 1.5; // perfect fifth
  const g5 = ac.createGain();
  g5.gain.value = 0;
  osc5.connect(g5); g5.connect(masterGain);
  osc5.start();

  // ---- sub bass ----
  const sub = ac.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = f * 0.5;
  const gSub = ac.createGain();
  gSub.gain.value = 0.35;
  sub.connect(gSub); gSub.connect(masterGain);
  sub.start();

  // ---- noise texture ----
  const bufferSize = ac.sampleRate * 4;
  const noiseBuffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const noiseSource = ac.createBufferSource();
  noiseSource.buffer = noiseBuffer;
  noiseSource.loop = true;
  noiseSource.start();

  const noiseBpf = ac.createBiquadFilter();
  noiseBpf.type = 'bandpass';
  noiseBpf.frequency.value = 200;
  noiseBpf.Q.value = 8;

  const noiseGain = ac.createGain();
  noiseGain.gain.value = 0;

  noiseSource.connect(noiseBpf);
  noiseBpf.connect(noiseGain);
  noiseGain.connect(masterGain);

  // ---- upper harmonics (granular-ish shimmer) ----
  const shimmer1 = ac.createOscillator();
  const shimmer2 = ac.createOscillator();
  shimmer1.type = 'sine';
  shimmer2.type = 'sine';
  shimmer1.frequency.value = f * 4.01;
  shimmer2.frequency.value = f * 6.98;

  const shimmerGain = ac.createGain();
  shimmerGain.gain.value = 0;

  const shimmerLpf = ac.createBiquadFilter();
  shimmerLpf.type = 'lowpass';
  shimmerLpf.frequency.value = 3000;

  shimmer1.connect(shimmerGain);
  shimmer2.connect(shimmerGain);
  shimmerGain.connect(shimmerLpf);
  shimmerLpf.connect(masterGain);
  shimmer1.start(); shimmer2.start();

  // ---- slow LFO for drift ----
  const lfo = ac.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.08;
  const lfoGain = ac.createGain();
  lfoGain.gain.value = 0;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);
  lfo.start();

  const lfo2 = ac.createOscillator();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.13;
  const lfoGain2 = ac.createGain();
  lfoGain2.gain.value = 0;
  lfo2.connect(lfoGain2);
  lfoGain2.connect(osc2.frequency);
  lfo2.start();

  nodes = {
    masterGain, osc1, osc2, g5, osc5, sub, gSub,
    noiseGain, noiseBpf, shimmerGain,
    lfoGain, lfoGain2, lpf, f
  };
}

function updateParams() {
  if (!nodes.masterGain) return;
  const rootF = getVal('rootFreq');
  const drift = getVal('drift') / 100;
  const texture = getVal('texture') / 100;
  const upper = getVal('upper') / 100;
  const density = getVal('density') / 100;

  const now = ac.currentTime;
  const T = 0.4;

  nodes.osc1.frequency.setTargetAtTime(rootF, now, T);
  nodes.osc2.frequency.setTargetAtTime(rootF * 1.0015, now, T);
  nodes.osc5.frequency.setTargetAtTime(rootF * 1.5, now, T);
  nodes.sub.frequency.setTargetAtTime(rootF * 0.5, now, T);
  nodes.shimmerGain.gain.setTargetAtTime(upper * 0.12, now, T);

  // drift = LFO depth
  nodes.lfoGain.gain.setTargetAtTime(drift * rootF * 0.04, now, T);
  nodes.lfoGain2.gain.setTargetAtTime(drift * rootF * 0.035, now, T);

  // texture = noise gain
  nodes.noiseGain.gain.setTargetAtTime(texture * 0.08, now, T);
  nodes.noiseBpf.frequency.setTargetAtTime(80 + density * 400, now, T);

  // density = upper mix + sub
  nodes.g5.gain.setTargetAtTime(density * 0.3, now, T);
  nodes.gSub.gain.setTargetAtTime(0.2 + density * 0.25, now, T);

  // filter opens with density
  nodes.lpf.frequency.setTargetAtTime(200 + density * 600, now, T);
}

// ---- visualizer ----
let analyser = null;
let vizData = null;

function attachAnalyser() {
  analyser = ac.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.88;
  nodes.masterGain.connect(analyser);
  vizData = new Uint8Array(analyser.frequencyBinCount);
}

let t = 0;
function drawViz() {
  requestAnimationFrame(drawViz);
  t += 0.004;

  ctx2.fillStyle = 'rgba(8,8,16,0.25)';
  ctx2.fillRect(0, 0, W, H);

  if (!analyser || !playing) {
    // idle: slow breathing rings
    const n = 4;
    for (let i = 0; i < n; i++) {
      const phase = t * 0.4 + (i / n) * Math.PI * 2;
      const r = 60 + Math.sin(phase) * 20 + i * 40;
      const alpha = 0.04 + Math.sin(phase * 0.7) * 0.02;
      ctx2.beginPath();
      ctx2.arc(W/2, H/2, r, 0, Math.PI*2);
      ctx2.strokeStyle = `rgba(120,100,180,${alpha})`;
      ctx2.lineWidth = 1;
      ctx2.stroke();
    }
    return;
  }

  analyser.getByteFrequencyData(vizData);

  // radial frequency display
  const cx = W/2, cy = H/2;
  const bins = vizData.length;
  const maxR = Math.min(W, H) * 0.38;
  const minR = maxR * 0.28;

  ctx2.save();
  ctx2.translate(cx, cy);

  // draw as radial lines
  const step = (Math.PI * 2) / bins;
  for (let i = 0; i < bins; i++) {
    const angle = i * step - Math.PI/2 + t * 0.08;
    const v = vizData[i] / 255;
    const r1 = minR;
    const r2 = minR + v * (maxR - minR);
    const alpha = 0.15 + v * 0.6;
    const hue = 240 + v * 80;

    ctx2.beginPath();
    ctx2.moveTo(Math.cos(angle) * r1, Math.sin(angle) * r1);
    ctx2.lineTo(Math.cos(angle) * r2, Math.sin(angle) * r2);
    ctx2.strokeStyle = `hsla(${hue},60%,70%,${alpha})`;
    ctx2.lineWidth = 1.2;
    ctx2.stroke();
  }

  // center pulse
  const avgVol = vizData.reduce((s, v) => s + v, 0) / bins / 255;
  const pulseR = 12 + avgVol * 20;
  const grad = ctx2.createRadialGradient(0, 0, 0, 0, 0, pulseR);
  grad.addColorStop(0, `rgba(200,180,255,${0.4 + avgVol * 0.4})`);
  grad.addColorStop(1, 'transparent');
  ctx2.beginPath();
  ctx2.arc(0, 0, pulseR, 0, Math.PI*2);
  ctx2.fillStyle = grad;
  ctx2.fill();

  ctx2.restore();
}

drawViz();

// ---- controls ----
const startBtn = document.getElementById('startBtn');
const slidersEl = document.getElementById('sliders');
const statusEl = document.getElementById('status');

startBtn.addEventListener('click', async () => {
  if (!playing) {
    buildDrone();
    if (ac.state === 'suspended') await ac.resume();
    attachAnalyser();
    playing = true;
    startBtn.textContent = '[ stop ]';
    startBtn.classList.add('playing');
    slidersEl.classList.add('visible');
    statusEl.textContent = 'listening...';
    setTimeout(() => { statusEl.textContent = ''; }, 4000);
  } else {
    nodes.masterGain.gain.setTargetAtTime(0.0001, ac.currentTime, 1.5);
    setTimeout(() => {
      ac.close();
      ac = null;
      nodes = {};
      analyser = null;
    }, 2500);
    playing = false;
    startBtn.textContent = '[ begin ]';
    startBtn.classList.remove('playing');
    slidersEl.classList.remove('visible');
  }
});

// slider updates
['rootFreq','drift','texture','upper','density'].forEach(id => {
  const el = document.getElementById(id);
  const val = document.getElementById(id.replace(/[A-Z]/g, m => m) + 'Val') ||
               document.getElementById(id + 'Val');
  
  // find the val span in same row
  const row = el.closest('.slider-row');
  const valSpan = row.querySelector('.val');

  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    valSpan.textContent = id === 'rootFreq' ? v : Math.round(v);
    updateParams();
  });
});

// init display values
document.querySelectorAll('.slider-row').forEach(row => {
  const input = row.querySelector('input');
  const span = row.querySelector('.val');
  const id = input.id;
  span.textContent = id === 'rootFreq' ? input.value : Math.round(parseFloat(input.value));
});
</script>
</body>
</html>
