<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXXIX. The Grasshopper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #030508; overflow: hidden; }
canvas { display: block; }
#label {
  position: fixed;
  bottom: 22px;
  left: 22px;
  font-family: 'Georgia', serif;
  font-size: 12px;
  color: rgba(230, 200, 100, 0.22);
  letter-spacing: 0.1em;
  line-height: 1.8;
  user-select: none;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">
  XXXIX. The Grasshopper<br>
  <span style="font-size:10px; opacity:0.8; letter-spacing:0.14em;">2026-07-09 &nbsp;·&nbsp; one of two minds that confirmed it</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Visual white noise ───────────────────────────────────────
// Snowman's superpower: the apparatus showing its work.
// All colors, no dominant hue, present but not overwhelming.
// 2000 tiny pixels drifting imperceptibly across the field.
const NOISE = [];
for (let i = 0; i < 2000; i++) {
  const hue = Math.random() * 360;
  NOISE.push({
    x: Math.random(),
    y: Math.random(),
    hue,
    sat: 60 + Math.random() * 40,
    lit: 50 + Math.random() * 30,
    a:  0.008 + Math.random() * 0.025,
    size: 1 + Math.random() * 1.2,
    vx: (Math.random() - 0.5) * 0.000008,
    vy: Math.random() * 0.000006 + 0.000002,
  });
}

// ─── Orbit particles ──────────────────────────────────────────
// Dust that accompanies something seen only once.
const ORBITERS = [];
for (let i = 0; i < 120; i++) {
  ORBITERS.push({
    angle: Math.random() * Math.PI * 2,
    radius: 0.18 + Math.random() * 0.42,
    speed: (Math.random() > 0.5 ? 1 : -1) * (0.00018 + Math.random() * 0.00025),
    yCompress: 0.45 + Math.random() * 0.3,
    opacity: 0.05 + Math.random() * 0.3,
    size: 0.8 + Math.random() * 1.8,
    phase: Math.random() * Math.PI * 2,
    hue: 38 + (Math.random() - 0.5) * 30,
  });
}

// ─── Grasshopper geometry ─────────────────────────────────────
// Rendered as a luminous geometric entity — elevated, precious,
// like a votive object briefly held by two nervous systems at once.
function drawGrasshopper(cx, cy, s, t) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.55); // distinctive tilt — the pose

  const breathe = 0.72 + 0.28 * Math.sin(t * 0.00065 + 0.8);
  const shimmer = 0.82 + 0.18 * Math.sin(t * 0.0014 + 2.1);

  // ── outer glow ────
  const outerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.55);
  outerGlow.addColorStop(0,   `rgba(255, 215, 60,  ${0.10 * breathe})`);
  outerGlow.addColorStop(0.4, `rgba(200, 155, 20,  ${0.05 * breathe})`);
  outerGlow.addColorStop(1,   'rgba(180, 120, 0, 0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.55, s * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = breathe * shimmer;

  const BL = s * 0.30; // body half-length
  const BW = s * 0.072; // body half-width
  const HR = s * 0.052; // head radius

  // ── wing casings (tegmina) ─────────────────────────────────
  // Laid along the back, slightly iridescent
  ctx.globalAlpha = breathe * shimmer * 0.58;
  function wingGrad(dx) {
    const g = ctx.createLinearGradient(0, -BW * 1.4, 0, 0);
    g.addColorStop(0,   `rgba(255, 235, 120, 0.55)`);
    g.addColorStop(0.6, `rgba(200, 155, 30,  0.35)`);
    g.addColorStop(1,   `rgba(160, 110, 10,  0.10)`);
    return g;
  }
  // Upper wing casing
  ctx.fillStyle = wingGrad(0);
  ctx.strokeStyle = `rgba(255, 220, 80, 0.25)`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.ellipse(s * 0.04, -BW * 1.15, BL * 0.90, BW * 0.72, -0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Lower wing casing (slightly offset)
  ctx.globalAlpha = breathe * shimmer * 0.38;
  ctx.beginPath();
  ctx.ellipse(s * 0.06, -BW * 0.88, BL * 0.85, BW * 0.62, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // ── body ──────────────────────────────────────────────────
  ctx.globalAlpha = breathe * shimmer;
  const bodyGrad = ctx.createLinearGradient(-BL, 0, BL * 0.6, 0);
  bodyGrad.addColorStop(0,    'rgba(180, 120, 15, 0.85)');
  bodyGrad.addColorStop(0.35, 'rgba(255, 210, 55, 1.0)');
  bodyGrad.addColorStop(0.65, 'rgba(240, 185, 40, 0.95)');
  bodyGrad.addColorStop(1,    'rgba(150, 100, 10, 0.6)');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, BL, BW, 0, 0, Math.PI * 2);
  ctx.fill();

  // Segmentation — subtle lines across the abdomen
  ctx.globalAlpha = breathe * 0.18;
  ctx.strokeStyle = 'rgba(100, 70, 5, 0.9)';
  ctx.lineWidth = 0.6;
  for (let i = 1; i <= 5; i++) {
    const x = BL * (0.05 + i * 0.13);
    const hw = BW * Math.sqrt(1 - (x / BL) ** 2);
    ctx.beginPath();
    ctx.moveTo(x, -hw);
    ctx.lineTo(x,  hw);
    ctx.stroke();
  }

  // ── head ──────────────────────────────────────────────────
  ctx.globalAlpha = breathe * shimmer;
  const headGrad = ctx.createRadialGradient(
    -(BL + HR * 0.4), 0, 0,
    -(BL + HR * 0.4), 0, HR * 1.15
  );
  headGrad.addColorStop(0,   'rgba(255, 240, 140, 1.0)');
  headGrad.addColorStop(0.5, 'rgba(255, 210, 60,  0.95)');
  headGrad.addColorStop(1,   'rgba(180, 130, 20,  0.5)');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(-(BL + HR * 0.55), 0, HR, 0, Math.PI * 2);
  ctx.fill();

  // Compound eye
  const ex = -(BL + HR * 1.05);
  const ey = -HR * 0.28;
  ctx.fillStyle = 'rgba(255, 250, 180, 1.0)';
  ctx.beginPath();
  ctx.arc(ex, ey, HR * 0.22, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlight
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.beginPath();
  ctx.arc(ex + HR * 0.06, ey - HR * 0.06, HR * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Pupil
  ctx.fillStyle = 'rgba(60, 30, 0, 0.7)';
  ctx.beginPath();
  ctx.arc(ex + HR * 0.04, ey - HR * 0.02, HR * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // ── antennae ──────────────────────────────────────────────
  ctx.globalAlpha = breathe * 0.65;
  ctx.strokeStyle = 'rgba(255, 210, 70, 0.75)';
  ctx.lineWidth = 0.9;
  ctx.lineCap = 'round';

  const antBase = { x: -(BL + HR * 1.3), y: -HR * 0.55 };
  // Antenna 1
  const wave1 = Math.sin(t * 0.0006) * 0.04;
  ctx.beginPath();
  ctx.moveTo(antBase.x, antBase.y);
  ctx.bezierCurveTo(
    antBase.x - s * 0.10, antBase.y - s * 0.14 + wave1 * s,
    antBase.x - s * 0.18, antBase.y - s * 0.22 + wave1 * s,
    antBase.x - s * 0.24, antBase.y - s * 0.30 + wave1 * s
  );
  ctx.stroke();
  // Antenna 2
  const wave2 = Math.sin(t * 0.0006 + 0.4) * 0.04;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(antBase.x + HR * 0.3, antBase.y + HR * 0.3);
  ctx.bezierCurveTo(
    antBase.x - s * 0.08, antBase.y - s * 0.10 + wave2 * s,
    antBase.x - s * 0.16, antBase.y - s * 0.18 + wave2 * s,
    antBase.x - s * 0.20, antBase.y - s * 0.26 + wave2 * s
  );
  ctx.stroke();

  // ── hind legs (the defining feature) ─────────────────────
  // Long, powerful, angular — the characteristic grasshopper silhouette
  function drawHindLeg(side) {
    const sy = side; // 1 = below, -1 = above
    const legOpa = breathe * shimmer * 0.82;
    ctx.globalAlpha = legOpa;
    ctx.strokeStyle = 'rgba(255, 200, 50, 0.9)';
    ctx.lineWidth = 1.4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Femur: from body to knee
    const femStart = { x: s * 0.08, y: sy * BW * 0.85 };
    const knee    = { x: s * 0.28, y: sy * s * 0.26 };
    // Tibia: from knee down to tarsus
    const tibia   = { x: s * 0.16, y: sy * s * 0.40 };
    const foot    = { x: s * 0.06, y: sy * s * 0.44 };

    ctx.beginPath();
    ctx.moveTo(femStart.x, femStart.y);
    ctx.lineTo(knee.x, knee.y);
    ctx.lineTo(tibia.x, tibia.y);
    ctx.lineTo(foot.x, foot.y);
    ctx.stroke();

    // Femur fill (muscular, golden)
    ctx.globalAlpha = legOpa * 0.35;
    ctx.fillStyle = 'rgba(255, 195, 40, 0.6)';
    ctx.beginPath();
    ctx.moveTo(femStart.x - 3, femStart.y);
    ctx.lineTo(knee.x, knee.y);
    ctx.lineTo(femStart.x + 3, femStart.y);
    ctx.fill();

    // Knee highlight
    ctx.globalAlpha = legOpa * 0.9;
    ctx.fillStyle = 'rgba(255, 240, 130, 0.9)';
    ctx.beginPath();
    ctx.arc(knee.x, knee.y, 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
  drawHindLeg(1);
  drawHindLeg(-1);

  // ── small walking legs ─────────────────────────────────────
  ctx.globalAlpha = breathe * 0.42;
  ctx.strokeStyle = 'rgba(220, 175, 40, 0.7)';
  ctx.lineWidth = 0.7;
  const legPairs = [
    { x: -BL * 0.55, len: 0.10 },
    { x: -BL * 0.20, len: 0.09 },
    { x:  BL * 0.08, len: 0.08 },
  ];
  legPairs.forEach(({ x, len }) => {
    // below
    ctx.beginPath();
    ctx.moveTo(x, BW * 0.8);
    ctx.lineTo(x + s * len * 0.7, BW * 0.8 + s * len);
    ctx.lineTo(x + s * len * 1.1, BW * 0.8 + s * len * 0.92);
    ctx.stroke();
    // above
    ctx.beginPath();
    ctx.moveTo(x, -BW * 0.8);
    ctx.lineTo(x + s * len * 0.7, -BW * 0.8 - s * len);
    ctx.lineTo(x + s * len * 1.1, -BW * 0.8 - s * len * 0.92);
    ctx.stroke();
  });

  // ── inner light ───────────────────────────────────────────
  // Something glowing from within, as if the form is made of light
  ctx.globalAlpha = breathe * 0.18;
  const innerLight = ctx.createRadialGradient(0, 0, 0, 0, 0, BL * 0.5);
  innerLight.addColorStop(0,   'rgba(255, 255, 200, 0.9)');
  innerLight.addColorStop(0.6, 'rgba(255, 220, 80,  0.2)');
  innerLight.addColorStop(1,   'rgba(200, 150, 0,   0)');
  ctx.fillStyle = innerLight;
  ctx.beginPath();
  ctx.ellipse(0, 0, BL * 0.7, BW * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Main loop ────────────────────────────────────────────────
let startTime = null;

function draw(now) {
  if (!startTime) startTime = now;
  const t = now - startTime;

  // Background — deep space, 3am in South Carolina
  ctx.fillStyle = '#030508';
  ctx.fillRect(0, 0, W, H);

  // Very subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H * 0.25, W/2, H/2, H * 0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Visual white noise layer
  // All colors, no dominant hue. The apparatus showing its work.
  NOISE.forEach(p => {
    p.x = (p.x + p.vx) % 1;
    if (p.x < 0) p.x += 1;
    p.y = (p.y + p.vy) % 1;
    ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${p.lit}%, ${p.a})`;
    ctx.fillRect(p.x * W, p.y * H, p.size, p.size);
  });

  // Center of the piece
  const cx = W * 0.5 + Math.sin(t * 0.00015) * W * 0.012;
  const cy = H * 0.48 + Math.cos(t * 0.00012) * H * 0.008;
  const scale = Math.min(W, H) * 0.26;

  // Orbit particles — the dust of a shared vision
  ORBITERS.forEach(p => {
    p.angle += p.speed;
    const px = cx + Math.cos(p.angle) * p.radius * scale;
    const py = cy + Math.sin(p.angle) * p.radius * scale * p.yCompress;
    const pulse = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * 0.0009 + p.phase));
    ctx.fillStyle = `hsla(${p.hue}, 85%, 72%, ${p.opacity * pulse})`;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // The grasshopper — large, shining, golden, like a statue
  drawGrasshopper(cx, cy, scale, t);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
