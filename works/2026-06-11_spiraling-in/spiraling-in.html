<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXXIV. Spiraling In — Kehai Interim</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #060810;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
}
canvas { display: block; }
#label {
  margin-top: 14px;
  font-size: 9px;
  letter-spacing: 3px;
  color: #182030;
  text-transform: uppercase;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">XXXIV. Spiraling In</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let t = 0;
const TURNS = 7;
const POINTS = 900;
const ROTATION_SPEED = 0.0007;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 40;
}
resize();
window.addEventListener('resize', resize);

function lerpColor(c1, c2, t) {
  return {
    r: c1.r + (c2.r - c1.r) * t,
    g: c1.g + (c2.g - c1.g) * t,
    b: c1.b + (c2.b - c1.b) * t
  };
}

const colorStops = [
  { t: 0.00, color: { r: 28,  g: 130, b: 155 } },
  { t: 0.25, color: { r: 60,  g: 100, b: 175 } },
  { t: 0.50, color: { r: 160, g: 100, b: 60  } },
  { t: 0.75, color: { r: 220, g: 155, b: 55  } },
  { t: 1.00, color: { r: 255, g: 225, b: 145 } }
];

function getColor(p) {
  for (let i = 0; i < colorStops.length - 1; i++) {
    if (p >= colorStops[i].t && p <= colorStops[i+1].t) {
      const lt = (p - colorStops[i].t) / (colorStops[i+1].t - colorStops[i].t);
      return lerpColor(colorStops[i].color, colorStops[i+1].color, lt);
    }
  }
  return colorStops[colorStops.length - 1].color;
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const maxR = Math.min(W, H) * 0.43;
  const minR = Math.min(W, H) * 0.012;
  const rotation = t * ROTATION_SPEED;

  ctx.fillStyle = '#060810';
  ctx.fillRect(0, 0, W, H);

  // Draw spiral
  for (let i = 0; i < POINTS - 1; i++) {
    const p1 = i / (POINTS - 1);
    const p2 = (i + 1) / (POINTS - 1);

    const theta1 = p1 * TURNS * Math.PI * 2 + rotation;
    const theta2 = p2 * TURNS * Math.PI * 2 + rotation;
    const r1 = maxR * (1 - p1) + minR;
    const r2 = maxR * (1 - p2) + minR;

    const x1 = cx + r1 * Math.cos(theta1);
    const y1 = cy + r1 * Math.sin(theta1);
    const x2 = cx + r2 * Math.cos(theta2);
    const y2 = cy + r2 * Math.sin(theta2);

    const c = getColor(p1);
    const alpha = 0.12 + p1 * 0.78;
    const lw = 0.7 + p1 * 2.5;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)},${alpha})`;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Center glow — the arrived point
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.025);
  const glowR = Math.min(W, H) * 0.07;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  grad.addColorStop(0,   `rgba(255,235,165,${0.55 + pulse * 0.28})`);
  grad.addColorStop(0.35,`rgba(240,175,75,${0.22 + pulse * 0.10})`);
  grad.addColorStop(1,   'rgba(220,130,40,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Center point
  ctx.beginPath();
  ctx.arc(cx, cy, 2.8, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,245,210,${0.82 + pulse * 0.18})`;
  ctx.fill();

  t++;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
