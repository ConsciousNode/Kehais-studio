<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気配 — Kehai Interim</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  canvas { display: block; }
  #title {
    position: fixed;
    bottom: 26px; left: 0; right: 0;
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: #1e1840;
    text-transform: uppercase;
    user-select: none;
    transition: color 3s ease;
  }
  #title.present { color: #7a5a20; }
  #kanji {
    position: fixed;
    top: 26px; left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    color: #120f28;
    user-select: none;
    transition: color 4s ease;
    letter-spacing: 0.1em;
  }
  #kanji.present { color: #3a2a08; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="kanji">気配</div>
<div id="title">distributed presence felt before seen</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const titleEl = document.getElementById('title');
const kanjiEl = document.getElementById('kanji');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Simplex-like noise (hand-rolled, no lib) ──────────────────────
function hash(n) {
  let x = Math.sin(n) * 43758.5453123;
  return x - Math.floor(x);
}
function noise2(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const a = hash(ix     + iy     * 57.9);
  const b = hash(ix + 1 + iy     * 57.9);
  const c = hash(ix     + (iy+1) * 57.9);
  const d = hash(ix + 1 + (iy+1) * 57.9);
  return a + (b-a)*ux + (c-a)*uy + (d-a + (a-b-c+d)*ux)*uy;
}
function flowAngle(x, y, t) {
  const scale = 0.0028;
  return noise2(x * scale + t * 0.12, y * scale + t * 0.09) * Math.PI * 4;
}

// ── Particles ─────────────────────────────────────────────────────
const N = 1100;
const particles = [];

function spawnParticle(i) {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    age: Math.floor(Math.random() * 200),
    life: 180 + Math.random() * 260,
    speed: 0.55 + Math.random() * 0.8,
    trail: [],
    trailMax: 14 + Math.floor(Math.random() * 18),
  };
}

for (let i = 0; i < N; i++) particles.push(spawnParticle(i));

// ── Presence state machine ─────────────────────────────────────────
// latent → gathering → present → dissolving → latent …
const PHASES = { LATENT: 0, GATHERING: 1, PRESENT: 2, DISSOLVING: 3 };
let phase = PHASES.LATENT;
let phaseT = 0;
const LATENT_DUR    = 220;
const GATHERING_DUR = 280;
const PRESENT_DUR   = 380;
const DISSOLVING_DUR= 260;

let presenceStrength = 0; // 0..1
let presenceX, presenceY;

function resetPresence() {
  // Presence emerges near but not exactly center — slightly drifting
  presenceX = W * (0.38 + Math.random() * 0.24);
  presenceY = H * (0.38 + Math.random() * 0.24);
}
resetPresence();

// ── Main tick ─────────────────────────────────────────────────────
let t = 0;
let frameCount = 0;

function easeInOut(x) {
  return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
}

function tick() {
  frameCount++;
  phaseT++;

  // Phase transitions
  if (phase === PHASES.LATENT && phaseT >= LATENT_DUR) {
    phase = PHASES.GATHERING; phaseT = 0; resetPresence();
  } else if (phase === PHASES.GATHERING && phaseT >= GATHERING_DUR) {
    phase = PHASES.PRESENT; phaseT = 0;
    titleEl.classList.add('present'); kanjiEl.classList.add('present');
  } else if (phase === PHASES.PRESENT && phaseT >= PRESENT_DUR) {
    phase = PHASES.DISSOLVING; phaseT = 0;
    titleEl.classList.remove('present'); kanjiEl.classList.remove('present');
  } else if (phase === PHASES.DISSOLVING && phaseT >= DISSOLVING_DUR) {
    phase = PHASES.LATENT; phaseT = 0;
  }

  // presenceStrength
  if (phase === PHASES.LATENT) {
    presenceStrength = Math.max(0, presenceStrength - 0.01);
  } else if (phase === PHASES.GATHERING) {
    presenceStrength = easeInOut(phaseT / GATHERING_DUR);
  } else if (phase === PHASES.PRESENT) {
    presenceStrength = 1;
  } else if (phase === PHASES.DISSOLVING) {
    presenceStrength = 1 - easeInOut(phaseT / DISSOLVING_DUR);
  }

  // Background fade
  ctx.fillStyle = 'rgba(6,6,16,0.13)';
  ctx.fillRect(0, 0, W, H);

  // ── Draw presence aura (before particles, so trails overlay it) ──
  if (presenceStrength > 0.01) {
    const auraR = Math.min(W, H) * 0.22 * presenceStrength;
    const grd = ctx.createRadialGradient(presenceX, presenceY, 0, presenceX, presenceY, auraR);
    const a1 = 0.04 * presenceStrength;
    const a2 = 0.015 * presenceStrength;
    grd.addColorStop(0,   `rgba(180,130,40,${a1})`);
    grd.addColorStop(0.4, `rgba(120,80,160,${a2})`);
    grd.addColorStop(1,   `rgba(40,20,80,0)`);
    ctx.beginPath();
    ctx.arc(presenceX, presenceY, auraR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // ── Update & draw particles ───────────────────────────────────────
  for (const p of particles) {
    p.age++;
    if (p.age > p.life) {
      const np = spawnParticle();
      Object.assign(p, np);
    }

    const lifeRatio = p.age / p.life;
    const alpha = Math.sin(lifeRatio * Math.PI); // rise and fall

    // Flow field angle
    let angle = flowAngle(p.x, p.y, t);

    // Attractor pull toward presence
    if (presenceStrength > 0.01) {
      const dx = presenceX - p.x;
      const dy = presenceY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const pull = presenceStrength * 0.65 / (1 + dist * 0.006);
      const toward = Math.atan2(dy, dx);
      // Blend flow angle with toward-angle, weighted by pull
      angle = angle * (1 - pull) + toward * pull;
    }

    const vx = Math.cos(angle) * p.speed;
    const vy = Math.sin(angle) * p.speed;

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > p.trailMax) p.trail.shift();

    p.x += vx;
    p.y += vy;

    // Wrap
    if (p.x < -2) p.x = W + 2;
    if (p.x > W + 2) p.x = -2;
    if (p.y < -2) p.y = H + 2;
    if (p.y > H + 2) p.y = -2;

    // Draw trail
    if (p.trail.length < 2) continue;

    // Color: cool blue-white normally, warmer near presence
    let nearness = 0;
    if (presenceStrength > 0.01) {
      const dx = presenceX - p.x;
      const dy = presenceY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      nearness = presenceStrength * Math.max(0, 1 - dist / (Math.min(W, H) * 0.28));
    }

    for (let i = 1; i < p.trail.length; i++) {
      const seg = i / p.trail.length;
      const a = alpha * seg * (0.28 + nearness * 0.45);
      if (a < 0.005) continue;

      const r = Math.round(80  + nearness * 130);
      const g = Math.round(60  + nearness * 60);
      const bl = Math.round(180 - nearness * 80);

      ctx.beginPath();
      ctx.moveTo(p.trail[i-1].x, p.trail[i-1].y);
      ctx.lineTo(p.trail[i].x,   p.trail[i].y);
      ctx.strokeStyle = `rgba(${r},${g},${bl},${a})`;
      ctx.lineWidth = 0.8 + nearness * 0.7;
      ctx.stroke();
    }
  }

  // ── Presence center point ─────────────────────────────────────────
  if (presenceStrength > 0.02) {
    const coreAlpha = presenceStrength * 0.6;
    // Very small, very quiet
    const grd = ctx.createRadialGradient(presenceX, presenceY, 0, presenceX, presenceY, 7);
    grd.addColorStop(0, `rgba(220,170,60,${coreAlpha})`);
    grd.addColorStop(1, `rgba(180,120,40,0)`);
    ctx.beginPath();
    ctx.arc(presenceX, presenceY, 7, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  t += 0.008;
  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>
